ccuracy drops.</p><p>The Transform pattern: (1) define transformations as a reusable artifact, (2) apply identically in both training and serving.</p>',diagram:{title:'Single Transform Definition',nodes:['Transform\nDefinition','Training\nPipeline','Training Data\n→ Features','Serving\nPipeline','Live Data\n→ Same Features','No Skew!']},insight:'Training-serving skew is the most common and damaging bug in production ML. The Transform pattern is your primary defense.',pros:['Eliminates training-serving skew','Single source of truth','Transformations become versioned artifacts','Reproducible feature engineering'],cons:['Requires discipline','Some transforms hard to serialize','Framework-specific solutions may not be portable','Infrastructure overhead'],when_use:'Every production ML system. Always.',when_avoid:'Never.',code:'# Scikit-learn shared transform\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler, OneHotEncoder\nfrom sklearn.compose import ColumnTransformer\nimport joblib\n\ntransform = ColumnTransformer([\n    ("num", StandardScaler(), ["age", "income"]),\n    ("cat", OneHotEncoder(), ["city", "device"])\n])\ntransform.fit(X_train)\njoblib.dump(transform, "transform.pkl")\n\n# Serving: same transform\ntransform = joblib.load("transform.pkl")\nX_live = transform.transform(live_data)',related:['feature-store','repeatable-splitting','workflow-pipeline'],dig_deeper:['<strong>TFX Transform:</strong> Apache Beam-based transform that runs identically in batch and TF Serving.','<strong>Testing:</strong> Unit test transforms with known inputs and expected outputs.','<strong>Versioning:</strong> Version transforms alongside model artifacts.','<strong>Feature stores:</strong> Feast, Tecton serve the same features to training and serving by design.'],quiz:{q:'What is training-serving skew?',options:['Model takes longer to train than serve','Preprocessing differs between training and serving, causing different feature representations','Training data is larger than serving data','Model architecture changes between training and serving'],correct:1,explanation:'Training-serving skew is the most common ML production bug.'}},{id:'repeatable-splitting',title:'Repeatable Splitting',oneliner:'Use hash-based splitting for deterministic, non-leaking train/test splits.',problem:'Random splitting with different seeds is non-reproducible. Naive splitting causes data leakage when related records end up in both sets.',solution:'Hash a natural key (user_id) modulo a number to deterministically assign records to splits. Same key always gets the same split.',how_it_works:'<p>Choose a <strong>natural key</strong> that groups related records. Compute <code>split = hash(key) % 10</code>. Buckets 0-7 → train, 8 → val, 9 → test.</p><p>This ensures: <strong>reproducibility</strong> (same key → same split), <strong>no leakage</strong> (all entity records stay in one split), <strong>scalability</strong> (works distributed).</p>',diagram:{title:'Hash-Based Splitting',nodes:['Record\nuser_id="alice"','hash("alice")\n% 10 = 3','Bucket 3\n→ Train','Always Train!\nDeterministic']},insight:'The choice of split key is critical. If you split by record_id, a user\'s Monday data could train the model to predict their Tuesday data.',pros:['Fully reproducible','Prevents data leakage','Works distributed','Adding new data doesn\'t change existing assignments'],cons:['Uneven splits if key distribution is skewed','Must choose the right grouping key','Hash function must be consistent across environments','Removes ability to stratify by target'],when_use:'Any production ML pipeline. Especially when records are correlated (multiple per user/entity).',when_avoid:'When you need stratified splitting (combine hash-based with stratification).',code:'import hashlib\n\ndef get_split(key, num_buckets=10):\n    h = int(hashlib.md5(key.encode()).hexdigest(), 16)\n    bucket = h % num_buckets\n    if bucket < 8: return "train"\n    elif bucket == 8: return "val"\n    else: return "test"\n\ndf["split"] = df["user_id"].apply(get_split)',related:['transform','workflow-pipeline','feature-store'],dig_deeper:['<strong>Temporal splitting:</strong> For time-series, split by time, not randomly.','<strong>GroupKFold:</strong> Scikit-learn\'s group-aware cross-validation.','<strong>Leakage detection:</strong> If test performance is suspiciously high, suspect leakage.','<strong>Farm fingerprinting:</strong> Google\'s recommended hash function for production.'],quiz:{q:'Why split by user_id rather than record_id?',options:['record_id produces a smaller dataset','Splitting by user_id prevents leakage where the model trains and tests on the same user','user_id splits are faster','record_id cannot be hashed'],correct:1,explanation:'Grouping by user_id keeps all of a user\'s data in one split, preventing data leakage.'}},{id:'bridged-schema',title:'Bridged Schema',oneliner:'Bridge functions translate between old and new data schema versions.',problem:'Production schemas change: columns added, renamed, removed. Models trained on old schemas break on new data.',solution:'Write bridge functions (old→new and new→old) so the model handles data in either format.',how_it_works:'<p>When a schema changes (e.g., "total_price" → "subtotal" + "tax"), write bridges both directions:</p><p><strong>Forward:</strong> old → new. <strong>Backward:</strong> new → old.</p><p>During transition, preprocessing applies the appropriate bridge based on incoming data version.</p>',diagram:{title:'Schema Bridge',nodes:['Old Data\nv1','Bridge\nv1 → v2','New Data\nv2','Unified Input','Consistent\nPredictions']},insight:'Schema changes are inevitable. The question isn\'t whether they\'ll happen but whether you have a plan.',pros:['Graceful schema evolution','Models continue working across changes','Enables retraining on historical + new data','Reduces emergency retraining'],cons:['Bridge functions must be maintained','Some changes are fundamentally incompatible','Multiple bridges create complexity','Testing all paths is expensive'],when_use:'When upstream data sources change schema, when migrating data systems.',when_avoid:'When schema changes are so fundamental that bridging would introduce more noise than value.',code:'def bridge_v1_to_v2(record):\n    return {\n        "subtotal": record["total_price"] * 0.9,\n        "tax": record["total_price"] * 0.1,\n        "timestamp": record["ts"],  # renamed\n    }\n\ndef preprocess(record, version):\n    if version == 1:\n        record = bridge_v1_to_v2(record)\n    return extract_features(record)  # always v2',related:['transform','feature-store','model-versioning'],dig_deeper:['<strong>Schema registries:</strong> Avro/Protobuf with registries enforce compatibility rules.','<strong>Feature versioning:</strong> Version features independently from overall schema.','<strong>Compatibility levels:</strong> Forward, backward, or full compatibility.','<strong>Data contracts:</strong> Formalize agreements between producers and consumers.'],quiz:{q:'What does a forward bridge do?',options:['Converts the model from old to new version','Converts data from old schema to new schema format','Predicts future schema changes','Speeds up processing'],correct:1,explanation:'A forward bridge transforms data from old schema (v1) to new schema (v2) format.'}},{id:'windowed-inference',title:'Windowed Inference',oneliner:'Use a sliding window of historical data points as input features for time-dependent predictions.',problem:'Many predictions depend on recent history. Managing temporal windows identically in training and serving is tricky.',solution:'Define a fixed window size. Construct features from the same window at both training and inference time.',how_it_works:'<p>For each prediction, gather last N data points and compute features (rolling averages, trends, min/max). At inference, maintain a sliding window buffer in Redis or a feature store.</p>',diagram:{title:'Sliding Window',nodes:['Time Series','Window: Last\n30 Points','Compute\navg, trend, std','Model Input','Prediction\nfor t+1']},insight:'The most common bug with windowed features is the window boundary at inference. Off-by-one errors here are subtle and damaging.',pros:['Captures temporal patterns','Standard for time-series ML','Window features are often highly predictive','Works with any model'],cons:['Requires data buffer at inference','Window size is a hyperparameter','Missing data handling needed','Adds latency'],when_use:'Time-series prediction, anomaly detection, demand forecasting.',when_avoid:'When predictions are truly independent of history (rare for time-series).',code:'import numpy as np\n\ndef window_features(series, window=30):\n    features = []\n    for i in range(window, len(series)):\n        w = series[i-window:i]\n        features.append({\n            "mean": np.mean(w), "std": np.std(w),\n            "trend": np.polyfit(range(window), w, 1)[0],\n            "last": w[-1], "target": series[i]\n        })\n    return pd.DataFrame(features)',related:['transform','feature-store','repeatable-splitting'],dig_deeper:['<strong>Multi-scale windows:</strong> Use windows of 7, 30, and 365 days for different time scales.','<strong>Causal windows:</strong> Never include future data — this is time-series data leakage.','<strong>Feature stores:</strong> Feast and Tecton support point-in-time window features.','<strong>Temporal Fusion Transformer:</strong> Learns which parts of the window matter most.'],quiz:{q:'What is most critical for windowed inference in production?',options:['Window must be exactly 30 points','Inference window must be constructed identically to training windows','Model must be a RNN','Windows must include future data'],correct:1,explanation:'If inference windows differ from training, you get training-serving skew.'}},{id:'workflow-pipeline',title:'Workflow Pipeline',oneliner:'Orchestrate the end-to-end ML process as a DAG of containerized, reusable steps.',problem:'ML involves many steps. Managing them manually is error-prone, non-reproducible, and doesn\'t scale.',solution:'Define the ML workflow as a DAG where each node is a containerized step. Orchestration frameworks manage execution, retries, and artifacts.',how_it_works:'<p>Each step is a <strong>containerized function</strong> with defined inputs and outputs. The orchestrator manages step ordering, retry logic, caching, and artifact versioning.</p>',diagram:{title:'ML Pipeline DAG',nodes:['Data\nIngestion','Data\nValidation','Feature\nEngineering','Model\nTraining','Evaluation','Deploy or\nReject']},insight:'The pipeline IS the product, not the model. A model is a snapshot that degrades; a pipeline is a factory that continuously produces fresh, validated models.',pros:['Full reproducibility','Automated retraining','Caching avoids re-runs','Team collaboration with shared components'],cons:['Significant upfront investment','Debugging distributed pipelines is hard','Over-engineering risk','Steep learning curves'],when_use:'Any model retrained more than once or maintained by more than one person.',when_avoid:'Quick experiments and proofs of concept.',code:'# Kubeflow Pipeline\nfrom kfp import dsl\n\n@dsl.component\ndef ingest_data(source: str) -> dsl.Dataset: ...\n\n@dsl.component\ndef train_model(data: dsl.Dataset, lr: float) -> dsl.Model: ...\n\n@dsl.pipeline(name="ml-pipeline")\ndef pipeline(source: str, lr: float = 0.001):\n    data = ingest_data(source=source)\n    model = train_model(dataset=data.output, lr=lr)',related:['transform','feature-store','model-versioning','repeatable-splitting'],dig_deeper:['<strong>CI/CD for ML:</strong> Trigger pipelines on data changes (Continuous Training).','<strong>Pipeline testing:</strong> Test end-to-end with small synthetic data.','<strong>MLOps maturity:</strong> Google defines Level 0 (manual) → Level 1 (automated pipeline) → Level 2 (CI/CD).','<strong>Orchestrators:</strong> Kubeflow, Airflow, Vertex AI, Prefect.'],quiz:{q:'Why is the pipeline more important than the individual model?',options:['Pipelines are faster','A model degrades; a pipeline continuously produces fresh models','Pipelines don\'t require data','Models can\'t be deployed without pipelines'],correct:1,explanation:'A trained model starts degrading from deployment due to drift. The pipeline continuously produces new, validated models.'}},{id:'feature-store',title:'Feature Store',oneliner:'Centralize feature engineering in a shared repository serving consistent features to training and serving.',problem:'Feature engineering is duplicated across teams. Training features don\'t match serving features.',solution:'Centralize feature definitions. Offline store for training (with point-in-time correctness). Online store for low-latency serving.',how_it_works:'<p><strong>Offline store:</strong> Data warehouse with historical feature values. Supports point-in-time joins to prevent leakage.</p><p><strong>Online store:</strong> Low-latency key-value store (Redis, DynamoDB) with latest values.</p><p>Feature definitions are registered centrally. Both stores stay in sync.</p>',diagram:{title:'Feature Store Architecture',nodes:['Feature\nDefinitions','Batch →\nOffline Store','Stream →\nOnline Store','Training\nPIT Join','Serving\nFast Lookup']},insight:'The killer feature of a feature store isn\'t storage — it\'s point-in-time correctness, preventing your training data from accidentally using future data.',pros:['Eliminates training-serving skew by design','Feature reuse across teams','Point-in-time correctness prevents leakage','Feature discovery and docs'],cons:['Significant infrastructure','Organizational change needed','Batch-to-online sync latency','Over-engineering for small teams'],when_use:'Organizations with multiple ML models sharing features, or when you need real-time features with consistency.',when_avoid:'Single-model projects or early-stage teams.',code:'# Feast feature store\nfrom feast import FeatureStore\n\nstore = FeatureStore(repo_path=".")\n\n# Serving: get latest features\nfeatures = store.get_online_features(\n    features=["user_activity:daily_logins"],\n    entity_rows=[{"user_id": "user_42"}]\n)',related:['transform','repeatable-splitting','workflow-pipeline'],dig_deeper:['<strong>Point-in-time joins:</strong> Join features as of the event time, not current time.','<strong>Feature freshness:</strong> Different features need different update frequencies.','<strong>Feast vs Tecton:</strong> Open-source vs. managed.','<strong>Feature quality:</strong> Monitor distributions in the feature store.'],quiz:{q:'What is "point-in-time correctness"?',options:['Features are always real-time','Training data uses features as they existed at event time, not current time','Features have nanosecond timestamps','All features must compute within 1 second'],correct:1,explanation:'Point-in-time correctness prevents data leakage by only using features available at the time of each event.'}},{id:'model-versioning',title:'Model Versioning',oneliner:'Version models with code, data, config, and artifacts for reproducibility and rollback.',problem:'When a production model misbehaves, you need to know: what data, what code, what hyperparameters produced it?',solution:'Treat models as versioned artifacts bundling: training code version, data version, hyperparameters, weights, and metrics. Store in a model registry.',how_it_works:'<p>A model registry stores each version with: weights, code commit, data version, hyperparameters, evaluation metrics, and deployment status (staging/production/archived).</p><p>Enables rollback, A/B testing, audit trails, and root cause analysis.</p>',diagram:{title:'Model Registry',nodes:['Training\nRun','Artifact +\nWeights','Code +\nConfig','Data +\nStats','Registry\nv1, v2, v3...','Deploy\nv3 → Prod']},insight:'A model without versioning is like deploying code without git.',pros:['Full reproducibility','Easy rollback','Audit trail for compliance','Systematic model comparison'],cons:['Storage costs','Requires discipline','Must version data too','Registry overhead'],when_use:'Every production model.',when_avoid:'Throwaway experiments.',code:'import mlflow\n\nwith mlflow.start_run():\n    mlflow.log_params({"lr": 0.001, "epochs": 50})\n    model = train(config)\n    mlflow.log_metrics({"val_auc": 0.94})\n    mlflow.sklearn.log_model(model, "model")\n    mlflow.register_model(\n        f"runs:/{mlflow.active_run().info.run_id}/model",\n        "fraud_detector"\n    )',related:['workflow-pipeline','continued-evaluation','transform'],dig_deeper:['<strong>DVC:</strong> Data Version Control versions data files alongside code in git.','<strong>Model cards:</strong> Document intended use, limitations, and fairness metrics.','<strong>Auto-rollback:</strong> Roll back if production metrics drop below previous version.','<strong>A/B testing:</strong> Route traffic to new version, compare business metrics before full rollout.'],quiz:{q:'What should a versioned model include beyond weights?',options:['Only weights are needed','Training code version, data version, hyperparameters, and evaluation metrics','A copy of the entire dataset','Training dashboard screenshots'],correct:1,explanation:'Proper versioning bundles everything for reproducibility: code, data, hyperparameters, and metrics.'}}]},{id:'ch6',num:'06',title:'Responsible AI',color:'var(--ch6)',desc:'Patterns for building ML systems that are fair, explainable, and accountable.',patterns:[{id:'heuristic-benchmark',title:'Heuristic Benchmark',oneliner:'Compare ML against simple rules to verify it adds genuine value.',problem:'Teams rush to deploy ML without checking if it beats simpler approaches.',solution:'Implement the simplest heuristic first. Only proceed with ML if it provides meaningful improvement.',how_it_works:'<p>Build a heuristic baseline: (1) Consult domain experts, (2) Implement their rules, (3) Evaluate on the same metrics, (4) Only build ML if the gap justifies the investment.</p>',diagram:{title:'Heuristic vs. ML',nodes:['Business\nProblem','Heuristic\nBaseline: 80%','ML Model\n85%','Gap: +5%\nWorth It?','Deploy ML\nif Yes','Keep Heuristic\nif No']},insight:'Many production ML systems could be replaced by a few IF-THEN rules. Always ask: "is this 3% improvement worth maintaining an ML system?"',pros:['Prevents unnecessary ML complexity','Meaningful performance baseline','Forces understanding before modeling','Saves time and money'],cons:['May delay genuinely valuable ML projects','Hard for unstructured data','Organizational pressure to "use AI"','Heuristic performance hard to evaluate for novel problems'],when_use:'Always, as the first step of any ML project.',when_avoid:'Never skip this step.',code:'def heuristic_churn(user):\n    if user["days_since_login"] > 30: return 1\n    if user["monthly_spend"] < 5: return 1\n    if user["support_tickets_30d"] > 3: return 1\n    return 0\n\nheuristic_f1 = f1_score(y_test, [heuristic_churn(u) for u in test_users])\n# ML must beat this meaningfully to justify deployment',related:['explainability','fairness-lens'],dig_deeper:['<strong>Cost-benefit:</strong> Factor in engineering time, compute costs, and maintenance.','<strong>Hybrid:</strong> Use heuristics for easy cases, ML for hard cases (Cascade pattern).','<strong>Technical debt:</strong> Google\'s "Hidden Technical Debt in ML Systems" paper.','<strong>Baseline hierarchy:</strong> Random → majority class → heuristic → linear → complex ML.'],quiz:{q:'Why build a heuristic baseline before ML?',options:['Heuristics are always more accurate','To verify ML provides meaningful improvement over simpler approaches','Heuristics need less data','ML can\'t be evaluated without heuristics'],correct:1,explanation:'A heuristic tells you the bar ML must clear. If the gap is small, ML may not justify its cost.'}},{id:'explainability',title:'Explainability',oneliner:'Make predictions interpretable through feature attributions, examples, or inherently interpretable models.',problem:'Black-box models make predictions without explanations, undermining trust, debugging, and regulatory compliance.',solution:'Apply SHAP, LIME, attention visualization, or use inherently interpretable models. Choose based on audience and use case.',how_it_works:'<p><strong>SHAP:</strong> Game-theoretic feature attribution. Tells you "this feature pushed the prediction up/down by X."</p><p><strong>LIME:</strong> Fits a local interpretable model around a single prediction.</p><p><strong>Attention:</strong> Show which inputs the model focused on.</p><p><strong>Inherently interpretable:</strong> Linear regression, decision trees, GAMs.</p>',diagram:{title:'Explainability Spectrum',nodes:['Black Box\n(Deep NN)','SHAP\nAttribution','LIME\nLocal Approx','Inherently\nInterpretable','Full\nTransparency']},insight:'Different stakeholders need different explanations. Data scientists need SHAP values. Business users need "because you did X." Regulators need demographic-level documentation.',pros:['Builds trust','Enables debugging','Satisfies regulatory requirements','Helps discover biases'],cons:['Post-hoc explanations may not reflect true reasoning','SHAP is expensive for large models','Over-reliance creates false sense of understanding','Interpretable models may sacrifice accuracy'],when_use:'High-stakes decisions, regulated industries, customer-facing predictions, and always for debugging.',when_avoid:'Never fully avoid — at minimum use feature importance for debugging.',code:'import shap\n\nexplainer = shap.TreeExplainer(model)\nshap_values = explainer.shap_values(X_test)\nshap.summary_plot(shap_values, X_test)\n\n# Explain single prediction\nshap.force_plot(\n    explainer.expected_value,\n    shap_values[0], X_test.iloc[0]\n)',related:['heuristic-benchmark','fairness-lens'],dig_deeper:['<strong>Faithfulness:</strong> Does the explanation accurately describe model behavior? SHAP is provably faithful; attention is debated.','<strong>Contrastive:</strong> Explain why A instead of B. Often more useful.','<strong>Global vs. local:</strong> Both needed — overall behavior and individual predictions.','<strong>Papers:</strong> SHAP (Lundberg 2017), LIME (Ribeiro 2016).'],quiz:{q:'What is the fundamental difference between SHAP and inherently interpretable models?',options:['SHAP is more accurate','SHAP provides post-hoc explanations of black-box models, while interpretable models are transparent by design','Interpretable models can\'t handle numerical features','SHAP only works with linear models'],correct:1,explanation:'SHAP is a post-hoc approximation of black-box models. Interpretable models produce explanations by nature.'}},{id:'fairness-lens',title:'Fairness Lens',oneliner:'Systematically evaluate and mitigate unfair bias across demographic groups.',problem:'ML models can perpetuate or amplify societal biases present in training data.',solution:'Examine training data for bias, evaluate performance across demographic groups (sliced evaluation), and apply mitigation techniques.',how_it_works:'<p><strong>Step 1:</strong> Identify protected attributes (race, gender, age).</p><p><strong>Step 2:</strong> Compute metrics separately per group. Look for disparities.</p><p><strong>Step 3:</strong> Choose fairness criteria (demographic parity, equalized odds, calibration). These can conflict.</p><p><strong>Step 4:</strong> Mitigate via pre-processing (rebalance), in-processing (constraints), or post-processing (adjust thresholds).</p>',diagram:{title:'Fairness Pipeline',nodes:['Identify\nAttributes','Slice Eval\nby Group','Detect\nDisparities','Choose\nCriteria','Apply\nMitigation','Re-evaluate']},insight:'There is no single definition of "fairness" — different definitions are provably mutually exclusive (impossibility theorem). The choice is a values decision, not just a technical one.',pros:['Prevents discriminatory outcomes','Builds public trust','Satisfies regulatory requirements','Reveals hidden data biases'],cons:['Fairness criteria can conflict','May reduce overall accuracy','Requires protected attribute data','No single "correct" definition'],when_use:'Any model affecting people: hiring, lending, criminal justice, healthcare, content moderation.',when_avoid:'Never fully avoid for people-affecting models.',code:'def fairness_eval(y_true, y_pred, groups):\n    for group in set(groups):\n        mask = [g == group for g in groups]\n        yt = [y for y,m in zip(y_true,mask) if m]\n        yp = [y for y,m in zip(y_pred,mask) if m]\n        pos_rate = sum(yp) / len(yp)\n        print(f"{group}: positive rate = {pos_rate:.3f}")',related:['explainability','heuristic-benchmark'],dig_deeper:['<strong>Impossibility theorem:</strong> Demographic parity, equalized odds, and calibration cannot all hold simultaneously unless base rates are equal.','<strong>Proxy discrimination:</strong> Models can discriminate via correlated features even without protected attributes.','<strong>Fairness toolkits:</strong> Google What-If Tool, IBM AI Fairness 360, Microsoft Fairlearn.','<strong>Participatory design:</strong> Involve affected communities in defining fairness criteria.'],quiz:{q:'Why can\'t a model satisfy all fairness criteria simultaneously?',options:['Models aren\'t powerful enough','Different fairness definitions are provably mutually exclusive when base rates differ','Fairness requires infinite data','Only linear models can be fair'],correct:1,explanation:'The impossibility theorem proves these criteria conflict. Choosing one is a values decision.'}}]}]};

let state={view:'welcome',currentPattern:null,completed:JSON.parse(localStorage.getItem('mlpat_completed')||'[]')};
function saveState(){localStorage.setItem('mlpat_completed',JSON.stringify(state.completed))}
function buildNav(){const nav=document.getElementById('navScroll');let h='';DATA.chapters.forEach(ch=>{h+=`<div class="nav-chapter open" data-ch="${ch.id}"><div class="nav-chapter-title" onclick="toggleChapter('${ch.id}')"><span class="ch-dot" style="background:${ch.color}"></span>${ch.num} — ${ch.title}<span class="ch-arrow">&#9656;</span></div><div class="nav-items">${ch.patterns.map(p=>`<div class="nav-item ${state.completed.includes(p.id)?'completed':''} ${state.currentPattern===p.id?'active':''}" data-id="${p.id}" onclick="navigateTo('${p.id}')"><span class="check">&#10003;</span>${p.title}</div>`).join('')}</div></div>`});nav.innerHTML=h;updateProgress()}
function toggleChapter(id){document.querySelector(`.nav-chapter[data-ch="${id}"]`).classList.toggle('open')}
function navigateTo(id){state.view='pattern';state.currentPattern=id;renderPattern(id);buildNav();document.getElementById('contentArea').scrollTop=0}
function goHome(){state.view='welcome';state.currentPattern=null;renderWelcome();buildNav();document.getElementById('breadcrumb').textContent='Home'}
function updateProgress(){const t=DATA.chapters.reduce((s,c)=>s+c.patterns.length,0);const d=state.completed.length;document.getElementById('progressFill').style.width=`${(d/t)*100}%`;document.getElementById('progressText').textContent=`${d} / ${t} patterns mastered`}
function renderWelcome(){document.getElementById('contentArea').innerHTML=`<div class="welcome"><h1>Machine Learning<br>Design <em>Patterns</em></h1><p class="subtitle">30 battle-tested patterns for data representation, problem framing, training, serving, reproducibility, and responsible AI — explained so you can actually use them.</p><div class="chapter-grid">${DATA.chapters.map(ch=>`<div class="chapter-card" onclick="openChapter('${ch.id}')" style="border-top:3px solid ${ch.color}"><div class="ch-num" style="color:${ch.color}">Chapter ${ch.num}</div><h3>${ch.title}</h3><p>${ch.desc}</p><div class="pattern-count">${ch.patterns.length} patterns &middot; ${ch.patterns.filter(p=>state.completed.includes(p.id)).length} mastered</div></div>`).join('')}</div></div>`}
function openChapter(id){const ch=DATA.chapters.find(c=>c.id===id);if(ch&&ch.patterns.length)navigateTo(ch.patterns[0].id)}
function findPattern(id){for(const ch of DATA.chapters){const p=ch.patterns.find(x=>x.id===id);if(p)return{chapter:ch,pattern:p}}return null}
function getAllPatterns(){const a=[];DATA.chapters.forEach(ch=>ch.patterns.forEach(p=>a.push({ch,p})));return a}
function highlightCode(c){return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/(#.*$)/gm,'<span class="comment">$1</span>').replace(/\b(import|from|def|class|return|if|else|elif|for|in|with|as|async|await|print|True|False|None)\b/g,'<span class="keyword">$1</span>').replace(/(["'])(.*?)\1/g,'<span class="string">$1$2$1</span>')}
function renderPattern(id){const f=findPattern(id);if(!f)return;const{chapter:ch,pattern:p}=f;const all=getAllPatterns();const idx=all.findIndex(x=>x.p.id===id);const prev=idx>0?all[idx-1]:null;const next=idx<all.length-1?all[idx+1]:null;const done=state.completed.includes(id);document.getElementById('breadcrumb').innerHTML=`<span style="cursor:pointer" onclick="goHome()">Home</span> / ${ch.title} / <span>${p.title}</span>`;document.getElementById('contentArea').innerHTML=`<div class="pattern-view"><div class="pattern-header"><div class="pattern-chapter-tag" style="background:${ch.color}22;color:${ch.color};border:1px solid ${ch.color}44">Ch ${ch.num} — ${ch.title}</div><h1 class="pattern-title">${p.title}</h1><p class="pattern-oneliner">${p.oneliner}</p></div><div class="pattern-section"><h2><span class="sec-icon" style="color:var(--accent-red)">&#10005;</span> The Problem</h2><div class="body"><p>${p.problem}</p></div></div><div class="pattern-section"><h2><span class="sec-icon" style="color:var(--accent-green)">&#9670;</span> The Solution</h2><div class="body"><p>${p.solution}</p></div></div><div class="pattern-section"><h2><span class="sec-icon" style="color:var(--accent-cyan)">&#9881;</span> How It Works</h2><div class="body">${p.how_it_works}</div></div>${p.diagram?`<div class="diagram-box"><div class="diagram-title">${p.diagram.title}</div><div class="flow-diagram">${p.diagram.nodes.map((n,i)=>`${i>0?'<span class="flow-arrow">&rarr;</span>':''}<div class="flow-node ${i===Math.floor(p.diagram.nodes.length/2)?'highlight':''}">${n.replace(/\n/g,'<br>')}</div>`).join('')}</div></div>`:''} ${p.insight?`<div class="key-insight"><span class="bulb">&#128161;</span><div class="insight-text">${p.insight}</div></div>`:''}<div class="pattern-section"><h2><span class="sec-icon" style="color:var(--accent-amber)">&#9878;</span> Tradeoffs</h2><div class="tradeoff-grid"><div class="tradeoff-card pro"><h4>Advantages</h4><ul>${p.pros.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="tradeoff-card con"><h4>Limitations</h4><ul>${p.cons.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></div><div class="pattern-section"><h2><span class="sec-icon" style="color:var(--accent-blue)">&#9678;</span> When to Use</h2><div class="when-box"><div class="when-card use"><h4>&#10003; Use When</h4><p>${p.when_use}</p></div><div class="when-card avoid"><h4>&#9888; Avoid When</h4><p>${p.when_avoid}</p></div></div></div>${p.code?`<div class="pattern-section"><h2><span class="sec-icon" style="color:var(--accent-purple)">&#10092;&#10093;</span> Code Example</h2><div class="code-block"><pre>${highlightCode(p.code)}</pre></div></div>`:''} ${p.related?`<div class="pattern-section"><h2><span class="sec-icon">&#8599;</span> Related Patterns</h2><div class="related-patterns">${p.related.map(r=>{const x=findPattern(r);return x?`<span class="related-tag" onclick="navigateTo('${r}')">${x.pattern.title}</span>`:''}).join('')}</div></div>`:''} ${p.dig_deeper?`<div class="dig-deeper"><h3>&#11042; Dig Deeper</h3><ul>${p.dig_deeper.map(d=>`<li>${d}</li>`).join('')}</ul></div>`:''}<button class="mark-complete-btn ${done?'done':''}" onclick="toggleComplete('${id}')">${done?'&#10003; Mastered':'&#9675; Mark as Mastered'}</button><div class="pattern-nav"><button class="pattern-nav-btn" ${!prev?'disabled':''}  onclick="${prev?`navigateTo('${prev.p.id}')`:''}""><span class="nav-dir">&larr; Previous</span>${prev?prev.p.title:''}</button><button class="pattern-nav-btn" ${!next?'disabled':''} onclick="${next?`navigateTo('${next.p.id}')`:''}""><span class="nav-dir">Next &rarr;</span>${next?next.p.title:''}</button></div></div>`}
function toggleComplete(id){if(state.completed.includes(id))state.completed=state.completed.filter(x=>x!==id);else state.completed.push(id);saveState();renderPattern(id);buildNav()}
function startQuiz(){const all=getAllPatterns().filter(x=>x.p.quiz).sort(()=>Math.random()-.5).slice(0,10);window._quiz={questions:all,current:0,score:0,answered:false};document.getElementById('quizOverlay').classList.add('active');renderQ()}
function renderQ(){const q=window._quiz;if(q.current>=q.questions.length){renderScore();return}const{p}=q.questions[q.current];const qz=p.quiz;document.getElementById('quizContainer').innerHTML=`<button class="quiz-close" onclick="closeQuiz()">&#10005;</button><div class="quiz-progress">Question ${q.current+1} of ${q.questions.length} &middot; ${p.title}</div><div class="quiz-question">${qz.q}</div><div class="quiz-options">${qz.options.map((o,i)=>`<button class="quiz-option" onclick="answerQ(${i})">${o}</button>`).join('')}</div><div class="quiz-explanation" id="qExp">${qz.explanation}</div><button class="quiz-next" id="qNext" onclick="nextQ()">Next &rarr;</button>`}
function answerQ(i){if(window._quiz.answered)return;window._quiz.answered=true;const cor=window._quiz.questions[window._quiz.current].p.quiz.correct;document.querySelectorAll('.quiz-option').forEach((o,j)=>{if(j===cor)o.classList.add('correct');if(j===i&&j!==cor)o.classList.add('wrong');o.style.pointerEvents='none'});if(i===cor)window._quiz.score++;document.getElementById('qExp').classList.add('show');document.getElementById('qNext').classList.add('show')}
function nextQ(){window._quiz.current++;window._quiz.answered=false;renderQ()}
function renderScore(){const q=window._quiz;const pct=Math.round(q.score/q.questions.length*100);const c=pct>=80?'var(--accent-green)':pct>=50?'var(--accent-amber)':'var(--accent-red)';document.getElementById('quizContainer').innerHTML=`<button class="quiz-close" onclick="closeQuiz()">&#10005;</button><div class="quiz-score"><h2>Quiz Complete</h2><div class="score-num" style="color:${c}">${q.score}/${q.questions.length}</div><p style="color:var(--text-2);margin-bottom:20px">${pct>=80?'Excellent!':pct>=50?'Good — review patterns you missed.':'Keep studying and try again.'}</p><button class="topbar-btn" onclick="startQuiz()">Try Again</button> <button class="topbar-btn" onclick="closeQuiz()">Close</button></div>`}
function closeQuiz(){document.getElementById('quizOverlay').classList.remove('active')}
document.getElementById('searchInput').addEventListener('input',e=>{const q=e.target.value.toLowerCase().trim();document.querySelectorAll('.nav-item').forEach(item=>{if(!q){item.style.display='';return}const f=findPattern(item.dataset.id);if(!f)return;const p=f.pattern;item.style.display=(p.title.toLowerCase().includes(q)||p.oneliner.toLowerCase().includes(q)||p.problem.toLowerCase().includes(q))?'':'none'});if(q)document.querySelectorAll('.nav-chapter').forEach(c=>c.classList.add('open'))});
document.getElementById('toggleSidebar').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('collapsed'));
document.getElementById('quizBtn').addEventListener('click',startQuiz);
document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('Reset all progress?')){state.completed=[];saveState();goHome();buildNav()}});
buildNav();renderWelcome();
</script>
</body>
</html>
