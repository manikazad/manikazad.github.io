<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Design Patterns — Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #0a0b0f;
  --bg-1: #0f1117;
  --bg-2: #151720;
  --bg-3: #1a1d2a;
  --bg-4: #222638;
  --border: #2a2e42;
  --border-active: #3d4260;
  --text-0: #e8eaf0;
  --text-1: #b8bcc8;
  --text-2: #8890a4;
  --text-3: #5a6178;
  --accent-cyan: #00d4ff;
  --accent-cyan-dim: #00d4ff22;
  --accent-green: #00ff88;
  --accent-green-dim: #00ff8822;
  --accent-amber: #ffb800;
  --accent-amber-dim: #ffb80022;
  --accent-red: #ff4466;
  --accent-red-dim: #ff446622;
  --accent-purple: #a78bfa;
  --accent-purple-dim: #a78bfa22;
  --accent-blue: #60a5fa;
  --accent-blue-dim: #60a5fa22;
  --ch1: #00d4ff;
  --ch2: #ff6b9d;
  --ch3: #00ff88;
  --ch4: #ffb800;
  --ch5: #a78bfa;
  --ch6: #ff4466;
  --radius: 6px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --display: 'Instrument Serif', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; scroll-behavior:smooth; }
body { background:var(--bg-0); color:var(--text-1); font-family:var(--sans); line-height:1.6; overflow:hidden; height:100vh; }
.app { display:flex; height:100vh; }
.sidebar { width:300px; min-width:300px; background:var(--bg-1); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; transition:transform .3s,min-width .3s,width .3s; }
.sidebar.collapsed { transform:translateX(-300px); min-width:0; width:0; }
.sidebar-header { padding:20px; border-bottom:1px solid var(--border); }
.sidebar-logo { font-family:var(--display); font-size:1.5rem; color:var(--text-0); letter-spacing:-.5px; }
.sidebar-logo span { color:var(--accent-cyan); }
.sidebar-sub { font-family:var(--mono); font-size:.65rem; color:var(--text-3); text-transform:uppercase; letter-spacing:2px; margin-top:4px; }
.search-box { padding:12px 20px; border-bottom:1px solid var(--border); }
.search-box input { width:100%; background:var(--bg-2); border:1px solid var(--border); color:var(--text-0); font-family:var(--mono); font-size:.8rem; padding:8px 12px; border-radius:var(--radius); outline:none; transition:border-color .2s; }
.search-box input:focus { border-color:var(--accent-cyan); }
.search-box input::placeholder { color:var(--text-3); }
.nav-scroll { flex:1; overflow-y:auto; padding:8px 0; }
.nav-scroll::-webkit-scrollbar { width:4px; }
.nav-scroll::-webkit-scrollbar-track { background:transparent; }
.nav-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.nav-chapter { padding:4px 20px; margin-top:8px; }
.nav-chapter-title { font-family:var(--mono); font-size:.65rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-3); display:flex; align-items:center; gap:8px; cursor:pointer; padding:6px 0; user-select:none; }
.nav-chapter-title .ch-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.nav-chapter-title .ch-arrow { margin-left:auto; transition:transform .2s; font-size:.7rem; }
.nav-chapter.open .ch-arrow { transform:rotate(90deg); }
.nav-items { display:none; padding:2px 0 4px 16px; }
.nav-chapter.open .nav-items { display:block; }
.nav-item { padding:6px 12px; font-size:.82rem; color:var(--text-2); cursor:pointer; border-radius:var(--radius); transition:all .15s; display:flex; align-items:center; gap:8px; border-left:2px solid transparent; }
.nav-item:hover { color:var(--text-0); background:var(--bg-2); }
.nav-item.active { color:var(--text-0); background:var(--bg-3); border-left-color:var(--accent-cyan); }
.nav-item .check { font-size:.7rem; opacity:.4; }
.nav-item.completed .check { opacity:1; color:var(--accent-green); }
.sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); }
.sidebar-footer .progress-bar { height:4px; background:var(--bg-3); border-radius:2px; overflow:hidden; }
.sidebar-footer .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent-cyan),var(--accent-green)); border-radius:2px; transition:width .5s; }
.sidebar-footer .progress-text { font-family:var(--mono); font-size:.65rem; color:var(--text-3); margin-top:6px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { height:48px; min-height:48px; background:var(--bg-1); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; }
.topbar-toggle { background:none; border:none; color:var(--text-2); font-size:1.1rem; cursor:pointer; padding:4px; }
.topbar-toggle:hover { color:var(--text-0); }
.topbar-breadcrumb { font-family:var(--mono); font-size:.75rem; color:var(--text-3); }
.topbar-breadcrumb span { color:var(--text-1); }
.topbar-actions { margin-left:auto; display:flex; gap:8px; }
.topbar-btn { background:var(--bg-3); border:1px solid var(--border); color:var(--text-2); font-family:var(--mono); font-size:.7rem; padding:5px 12px; border-radius:var(--radius); cursor:pointer; transition:all .2s; text-transform:uppercase; letter-spacing:1px; }
.topbar-btn:hover { border-color:var(--accent-cyan); color:var(--accent-cyan); }
.content-area { flex:1; overflow-y:auto; padding:0; }
.content-area::-webkit-scrollbar { width:6px; }
.content-area::-webkit-scrollbar-track { background:var(--bg-0); }
.content-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.welcome { max-width:900px; margin:0 auto; padding:60px 40px; animation:fadeUp .6s ease; }
.welcome h1 { font-family:var(--display); font-size:3rem; color:var(--text-0); line-height:1.15; margin-bottom:12px; }
.welcome h1 em { color:var(--accent-cyan); font-style:italic; }
.welcome .subtitle { font-size:1.05rem; color:var(--text-2); max-width:600px; margin-bottom:40px; }
.chapter-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
.chapter-card { background:var(--bg-2); border:1px solid var(--border); border-radius:8px; padding:20px; cursor:pointer; transition:all .25s; position:relative; overflow:hidden; }
.chapter-card:hover { border-color:var(--border-active); transform:translateY(-2px); box-shadow:0 8px 32px #0004; }
.chapter-card .ch-num { font-family:var(--mono); font-size:.65rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
.chapter-card h3 { font-family:var(--sans); font-size:1rem; font-weight:600; color:var(--text-0); margin-bottom:8px; }
.chapter-card p { font-size:.82rem; color:var(--text-2); line-height:1.5; }
.chapter-card .pattern-count { font-family:var(--mono); font-size:.7rem; color:var(--text-3); margin-top:12px; }
.pattern-view { max-width:900px; margin:0 auto; padding:40px; animation:fadeUp .4s ease; }
.pattern-header { margin-bottom:32px; }
.pattern-chapter-tag { font-family:var(--mono); font-size:.65rem; text-transform:uppercase; letter-spacing:2px; padding:4px 10px; border-radius:3px; display:inline-block; margin-bottom:12px; }
.pattern-title { font-family:var(--display); font-size:2.4rem; color:var(--text-0); line-height:1.2; margin-bottom:8px; }
.pattern-oneliner { font-size:1.05rem; color:var(--text-2); font-style:italic; }
.pattern-section { margin-bottom:32px; }
.pattern-section h2 { font-family:var(--sans); font-weight:600; font-size:1.1rem; color:var(--text-0); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.pattern-section h2 .sec-icon { width:24px; height:24px; background:var(--bg-3); border-radius:4px; display:inline-flex; align-items:center; justify-content:center; font-size:.75rem; }
.pattern-section .body { color:var(--text-1); font-size:.92rem; line-height:1.7; }
.pattern-section .body p { margin-bottom:12px; }
.pattern-section .body strong { color:var(--text-0); font-weight:600; }
.pattern-section .body code { font-family:var(--mono); font-size:.8rem; background:var(--bg-3); padding:2px 6px; border-radius:3px; color:var(--accent-cyan); }
.pattern-section .body ul,.pattern-section .body ol { padding-left:20px; margin-bottom:12px; }
.pattern-section .body li { margin-bottom:6px; }
.diagram-box { background:var(--bg-2); border:1px solid var(--border); border-radius:8px; padding:24px; margin:16px 0; overflow-x:auto; }
.diagram-box .diagram-title { font-family:var(--mono); font-size:.65rem; text-transform:uppercase; letter-spacing:2px; color:var(--text-3); margin-bottom:16px; }
.flow-diagram { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; }
.flow-node { background:var(--bg-3); border:1px solid var(--border); border-radius:6px; padding:10px 16px; font-family:var(--mono); font-size:.72rem; color:var(--text-0); text-align:center; min-width:90px; line-height:1.4; }
.flow-node.highlight { border-color:var(--accent-cyan); box-shadow:0 0 12px var(--accent-cyan-dim); }
.flow-arrow { color:var(--text-3); font-size:1rem; }
.key-insight { background:linear-gradient(135deg,var(--accent-cyan-dim),var(--accent-green-dim)); border:1px solid #00d4ff44; border-radius:8px; padding:16px 20px; margin:16px 0; display:flex; gap:12px; align-items:flex-start; }
.key-insight .bulb { font-size:1.2rem; flex-shrink:0; margin-top:2px; }
.key-insight .insight-text { font-size:.88rem; color:var(--text-0); line-height:1.6; }
.tradeoff-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0; }
.tradeoff-card { background:var(--bg-2); border:1px solid var(--border); border-radius:6px; padding:14px 16px; }
.tradeoff-card.pro { border-left:3px solid var(--accent-green); }
.tradeoff-card.con { border-left:3px solid var(--accent-red); }
.tradeoff-card h4 { font-family:var(--mono); font-size:.7rem; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
.tradeoff-card.pro h4 { color:var(--accent-green); }
.tradeoff-card.con h4 { color:var(--accent-red); }
.tradeoff-card ul { list-style:none; padding:0; }
.tradeoff-card li { font-size:.82rem; color:var(--text-1); padding:3px 0; padding-left:16px; position:relative; }
.tradeoff-card li::before { content:''; position:absolute; left:0; top:10px; width:6px; height:6px; border-radius:50%; }
.tradeoff-card.pro li::before { background:var(--accent-green); }
.tradeoff-card.con li::before { background:var(--accent-red); }
.code-block { background:var(--bg-0); border:1px solid var(--border); border-radius:6px; padding:16px; margin:12px 0; overflow-x:auto; }
.code-block pre { font-family:var(--mono); font-size:.78rem; line-height:1.6; color:var(--text-1); }
.code-block .comment { color:var(--text-3); }
.code-block .keyword { color:var(--accent-purple); }
.code-block .string { color:var(--accent-green); }
.when-box { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0; }
.when-card { background:var(--bg-2); border:1px solid var(--border); border-radius:6px; padding:14px; }
.when-card h4 { font-family:var(--mono); font-size:.68rem; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
.when-card.use h4 { color:var(--accent-green); }
.when-card.avoid h4 { color:var(--accent-amber); }
.when-card p { font-size:.82rem; color:var(--text-1); line-height:1.5; }
.dig-deeper { background:var(--bg-2); border:1px solid var(--border); border-radius:8px; padding:20px; margin:20px 0; }
.dig-deeper h3 { font-family:var(--mono); font-size:.72rem; text-transform:uppercase; letter-spacing:2px; color:var(--accent-purple); margin-bottom:12px; }
.dig-deeper ul { list-style:none; padding:0; }
.dig-deeper li { padding:6px 0; font-size:.85rem; color:var(--text-1); border-bottom:1px solid var(--border); line-height:1.5; }
.dig-deeper li:last-child { border-bottom:none; }
.dig-deeper li strong { color:var(--text-0); }
.pattern-nav { display:flex; justify-content:space-between; margin-top:40px; padding-top:20px; border-top:1px solid var(--border); }
.pattern-nav-btn { background:var(--bg-2); border:1px solid var(--border); color:var(--text-1); font-family:var(--sans); font-size:.85rem; padding:12px 20px; border-radius:var(--radius); cursor:pointer; transition:all .2s; max-width:45%; text-align:left; }
.pattern-nav-btn:hover { border-color:var(--accent-cyan); color:var(--text-0); }
.pattern-nav-btn .nav-dir { font-family:var(--mono); font-size:.6rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-3); display:block; margin-bottom:4px; }
.pattern-nav-btn:disabled { opacity:.3; cursor:default; }
.mark-complete-btn { display:block; margin:24px auto 0; background:var(--accent-green-dim); border:1px solid #00ff8866; color:var(--accent-green); font-family:var(--mono); font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; padding:10px 24px; border-radius:var(--radius); cursor:pointer; transition:all .2s; }
.mark-complete-btn:hover { background:#00ff8833; }
.mark-complete-btn.done { background:var(--accent-green); color:var(--bg-0); }
.quiz-overlay { position:fixed; inset:0; background:#0a0b0fee; z-index:100; display:none; align-items:center; justify-content:center; }
.quiz-overlay.active { display:flex; }
.quiz-container { background:var(--bg-1); border:1px solid var(--border); border-radius:12px; padding:40px; max-width:640px; width:90%; animation:fadeUp .3s ease; }
.quiz-close { background:none; border:none; color:var(--text-3); font-size:1.2rem; cursor:pointer; float:right; }
.quiz-close:hover { color:var(--text-0); }
.quiz-progress { font-family:var(--mono); font-size:.65rem; color:var(--text-3); text-transform:uppercase; letter-spacing:2px; margin-bottom:20px; }
.quiz-question { font-size:1.15rem; color:var(--text-0); margin-bottom:24px; line-height:1.5; }
.quiz-options { display:flex; flex-direction:column; gap:10px; }
.quiz-option { background:var(--bg-2); border:1px solid var(--border); border-radius:6px; padding:12px 16px; font-size:.9rem; color:var(--text-1); cursor:pointer; transition:all .2s; text-align:left; font-family:var(--sans); }
.quiz-option:hover { border-color:var(--accent-cyan); color:var(--text-0); }
.quiz-option.correct { border-color:var(--accent-green); background:var(--accent-green-dim); color:var(--accent-green); }
.quiz-option.wrong { border-color:var(--accent-red); background:var(--accent-red-dim); color:var(--accent-red); }
.quiz-option.reveal { border-color:#2a2e42; }
.quiz-explanation { margin-top:16px; padding:16px; background:var(--bg-2); border-radius:6px; font-size:.85rem; color:var(--text-1); line-height:1.6; display:none; }
.quiz-explanation.show { display:block; }
.quiz-next { margin-top:16px; background:var(--accent-cyan-dim); border:1px solid #00d4ff66; color:var(--accent-cyan); font-family:var(--mono); font-size:.72rem; text-transform:uppercase; letter-spacing:1.5px; padding:10px 24px; border-radius:var(--radius); cursor:pointer; display:none; }
.quiz-next.show { display:inline-block; }
.quiz-score { text-align:center; padding:40px; }
.quiz-score h2 { font-family:var(--display); font-size:2rem; color:var(--text-0); margin-bottom:8px; }
.quiz-score .score-num { font-family:var(--mono); font-size:3rem; font-weight:700; margin:16px 0; }
.related-patterns { display:flex; gap:10px; flex-wrap:wrap; margin:12px 0; }
.related-tag { background:var(--bg-3); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:.78rem; color:var(--text-2); cursor:pointer; transition:all .2s; font-family:var(--mono); }
.related-tag:hover { border-color:var(--accent-cyan); color:var(--accent-cyan); }
@media(max-width:768px) {
  .sidebar { position:fixed; z-index:50; height:100vh; }
  .sidebar.collapsed { transform:translateX(-300px); }
  .tradeoff-grid,.when-box { grid-template-columns:1fr; }
  .welcome h1 { font-size:2rem; }
  .pattern-title { font-size:1.8rem; }
  .pattern-view,.welcome { padding:24px 20px; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">ML Design <span>Patterns</span></div>
      <div class="sidebar-sub">Interactive Field Manual</div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search patterns...">
    </div>
    <div class="nav-scroll" id="navScroll"></div>
    <div class="sidebar-footer">
      <div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text" id="progressText">0 / 30 patterns mastered</div>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="topbar-toggle" id="toggleSidebar" title="Toggle sidebar">&#9776;</button>
      <div class="topbar-breadcrumb" id="breadcrumb">Home</div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="quizBtn">&#9670; Quiz</button>
        <button class="topbar-btn" id="resetBtn">&#8634; Reset</button>
      </div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </main>
</div>
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-container" id="quizContainer"></div>
</div>
<script>
const DATA={chapters:[{id:'ch1',num:'01',title:'Data Representation',color:'var(--ch1)',desc:'Patterns for transforming raw data into features that ML models can effectively learn from.',patterns:[{id:'hashed-feature',title:'Hashed Feature',oneliner:'Map high-cardinality categorical variables into a fixed-size vector using a hash function.',problem:'Categorical features with millions of unique values (e.g., product IDs, URLs) create vocabulary management nightmares. New categories at inference break one-hot schemes.',solution:'Apply a deterministic hash function to map any category string to one of N buckets. The model learns weights for each bucket rather than each unique value. You accept some hash collisions as noise in exchange for a fixed, manageable vocabulary size.',how_it_works:'<p>Instead of maintaining a lookup table of all possible values, you compute <code>bucket = hash(value) % num_buckets</code>. The result is an integer in [0, N) which is then used as a feature index. Collisions happen when two different values map to the same bucket, but if N is large enough relative to the data\'s effective cardinality, collisions have minimal impact.</p><p>The key tradeoff is the <strong>number of buckets</strong>: too few causes excessive collisions and information loss; too many wastes capacity on empty buckets. A good heuristic is to set buckets to roughly 2-5x the expected distinct values you want to differentiate.</p>',diagram:{title:'Hashed Feature Pipeline',nodes:['Raw Category\n"product_XYZ"','Hash Function\nfarmhash()','Bucket Index\n% 1000 → 427','Embedding\nLookup','Model Input\n[0.12, -0.3, ...]']},insight:'Hashing gives you a cold-start superpower — new categories unseen during training automatically get a bucket assignment at inference time, with no vocabulary update needed.',pros:['No vocabulary file to manage or update','Handles new/unseen categories gracefully','Fixed memory footprint regardless of cardinality','Works well as input to an embedding layer'],cons:['Hash collisions cause information loss','Can\'t reverse-engineer which original value a bucket represents','Choosing bucket count requires experimentation','Collisions may conflate semantically different categories'],when_use:'Very high-cardinality categoricals (>10K unique values), or when new categories constantly appear (e.g., user IDs in a growing platform).',when_avoid:'Low-cardinality categoricals where one-hot or label encoding works fine, or when interpretability of individual category effects is critical.',code:'# TensorFlow example\nfeature_column = tf.feature_column.categorical_column_with_hash_bucket(\n    key="product_id",\n    hash_bucket_size=10000\n)\n# Often combined with an embedding\nembedded = tf.feature_column.embedding_column(\n    feature_column, dimension=16\n)',related:['embeddings','feature-cross'],dig_deeper:['<strong>Collision analysis:</strong> Track how many distinct values map to each bucket. If the distribution is very skewed, increase bucket count.','<strong>Multiple hash functions:</strong> Use two independent hashes and concatenate results to reduce collision impact.','<strong>Feature engineering tip:</strong> Combine hashed features with other features using Feature Cross pattern for richer representations.','<strong>Paper:</strong> "Feature Hashing for Large Scale Multitask Learning" — Weinberger et al., 2009.'],quiz:{q:'Why is a hashed feature preferable to one-hot encoding for a user_id column with 50 million distinct users?',options:['One-hot would require a 50M-dimensional sparse vector and break on new users','Hashing is always more accurate than one-hot encoding','One-hot encoding cannot handle string inputs','Hashing provides better interpretability'],correct:0,explanation:'One-hot encoding of 50M users creates an impractically large and sparse vector, and any new user at inference would have no representation. Hashing maps all users to a fixed-size bucket vector.'}},{id:'embeddings',title:'Embeddings',oneliner:'Learn a dense, low-dimensional vector representation that captures semantic relationships between entities.',problem:'Categorical and textual data have no natural numeric representation. One-hot encodings are sparse, high-dimensional, and fail to capture similarity between categories.',solution:'Train (or use pretrained) embedding layers that map discrete tokens to dense vectors in a continuous space where semantically similar items are nearby.',how_it_works:'<p>An embedding layer is essentially a lookup table of shape <code>[vocab_size, embedding_dim]</code> trained via backpropagation. Each unique category gets its own trainable vector.</p><p>During training, the model adjusts these vectors so that items used in similar contexts end up with similar embeddings. For example, word embeddings place "king" and "queen" near each other.</p><p><strong>Pretrained embeddings</strong> (Word2Vec, GloVe, BERT) give you a head start by providing vectors trained on massive corpora. You can fine-tune them or use them frozen.</p>',diagram:{title:'Embedding Lookup',nodes:['Input Token\n"cat" → idx 42','Embedding Matrix\n[V × D]','Dense Vector\n[0.2, -0.1, 0.8, ...]','Downstream\nModel Layers']},insight:'Embeddings are one of the most powerful ideas in modern ML. They turn the "everything is a number" challenge into an opportunity by letting the model discover its own representation of your data.',pros:['Captures semantic similarity between categories','Dramatically reduces dimensionality vs. one-hot','Pretrained versions enable transfer learning','Can be visualized and inspected for insight'],cons:['Requires sufficient training data to learn good representations','Cold-start problem for unseen tokens','Embedding dimension is a hyperparameter to tune','Large vocabularies need significant memory'],when_use:'Any categorical variable with semantic structure: words, products, user types, geographic regions.',when_avoid:'Very low-cardinality features where simpler encodings suffice, or when you have very little training data.',code:'# PyTorch embedding\nimport torch.nn as nn\n\nembedding = nn.Embedding(\n    num_embeddings=50000,\n    embedding_dim=128\n)\ntoken_ids = torch.tensor([42, 7, 1001])\nvectors = embedding(token_ids)  # shape: [3, 128]',related:['hashed-feature','feature-cross','transfer-learning'],dig_deeper:['<strong>Embedding projector:</strong> Use TensorBoard\'s Embedding Projector to visualize your learned embeddings in 3D with t-SNE or PCA.','<strong>Dimension sizing:</strong> A common heuristic is dim = min(50, cardinality // 2), but empirical tuning is best.','<strong>Contextual embeddings:</strong> BERT and GPT produce context-dependent embeddings where the same word gets different vectors depending on surrounding words.','<strong>Paper:</strong> "Efficient Estimation of Word Representations in Vector Space" — Mikolov et al., 2013.'],quiz:{q:'What property makes learned embeddings more useful than one-hot encoding?',options:['They use less disk space','Semantically similar items get similar vectors','They guarantee zero information loss','They work without any training data'],correct:1,explanation:'The key advantage of embeddings is that training pushes semantically similar items to nearby positions in the vector space, enabling the model to generalize across related categories.'}},{id:'feature-cross',title:'Feature Cross',oneliner:'Create new features by combining two or more categorical features to capture interaction effects.',problem:'Linear models cannot capture non-linear interactions between features. If the effect of feature A depends on the value of feature B, a linear model will miss this entirely.',solution:'Explicitly create a new combined feature that is the Cartesian product of two or more features. For example, cross day_of_week × hour_of_day to capture that "Monday morning" behaves differently from "Saturday morning".',how_it_works:'<p>For two categorical features A (with a values) and B (with b values), the feature cross creates up to <code>a × b</code> new categories. Each combination becomes its own "bucket" that the model can assign an independent weight to.</p><p>This is how wide-and-deep models capture memorization: the crossed features let the model remember specific combinations seen in training data.</p><p>The crossed feature is typically hashed to keep the resulting feature space manageable, since the Cartesian product can be enormous.</p>',diagram:{title:'Feature Cross Construction',nodes:['Feature A\nday_of_week','Feature B\nhour_of_day','Cross\n"Mon_9am"','Hash Bucket\n→ idx 734','Model']},insight:'Feature crosses are the secret weapon behind recommendation systems. They let models memorize specific user-item combinations while other model parts generalize.',pros:['Captures interaction effects that linear models miss','Simple to implement and understand','Powers the "wide" part of Wide & Deep models','Effective for recommendation/ranking tasks'],cons:['Combinatorial explosion of the feature space','Requires hashing for high-cardinality crosses','Can lead to overfitting on training-specific combinations','Manual selection of which features to cross requires domain knowledge'],when_use:'When domain knowledge suggests two features interact (e.g., location × time, user × item). Critical for linear or shallow models.',when_avoid:'When both features are continuous (use polynomial features or let the DNN learn interactions).',code:'# TensorFlow feature cross\nday = tf.feature_column.categorical_column_with_vocabulary_list(\n    "day", ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"])\nhour = tf.feature_column.categorical_column_with_identity("hour", 24)\n\ncrossed = tf.feature_column.crossed_column(\n    [day, hour], hash_bucket_size=500\n)',related:['hashed-feature','embeddings'],dig_deeper:['<strong>Wide & Deep:</strong> Google\'s landmark architecture uses feature crosses in the "wide" linear component for memorization combined with a DNN "deep" component for generalization.','<strong>Higher-order crosses:</strong> You can cross 3+ features but the combinatorial space grows explosively — always hash.','<strong>AutoCross:</strong> Research on automatically discovering useful feature crosses via beam search.','<strong>Paper:</strong> "Wide & Deep Learning for Recommender Systems" — Cheng et al., 2016.'],quiz:{q:'What is the primary benefit of crossing day_of_week with hour_of_day?',options:['It reduces the total number of features','It allows the model to learn that specific day-hour combinations have unique effects','It converts continuous features to categorical','It eliminates the need for an embedding layer'],correct:1,explanation:'The cross lets the model assign independent weights to combinations like "Monday 9am" vs "Saturday 9am", capturing interaction effects that neither feature alone can express.'}},{id:'multimodal-input',title:'Multimodal Input',oneliner:'Combine different types of input data (images, text, structured) into a single model architecture.',problem:'Real-world ML problems often involve multiple data types. Training separate models for each modality loses cross-modal signals.',solution:'Design a model with separate input branches for each modality, each using an appropriate encoder (CNN for images, transformer for text, dense layers for tabular), then merge the encoded representations before final prediction layers.',how_it_works:'<p>Each modality gets its own preprocessing pipeline and encoder that transforms raw input into a fixed-size dense vector. Common merge strategies:</p><p><strong>Concatenation:</strong> Stack all encoded vectors. Simple but may let one modality dominate.</p><p><strong>Attention-based fusion:</strong> Learn which modality matters most for each prediction.</p><p><strong>Cross-attention:</strong> Let each modality attend to the others. Most powerful but computationally expensive.</p>',diagram:{title:'Multimodal Architecture',nodes:['Image → CNN\nEncoder','Text → BERT\nEncoder','Tabular → Dense\nLayers','Fusion\nLayer','Prediction\nHead']},insight:'The fusion strategy matters as much as the individual encoders. Late fusion (concatenate final representations) is simplest; early fusion (cross-attention at lower layers) captures richer cross-modal interactions but is harder to train.',pros:['Captures cross-modal relationships','Often outperforms single-modality models','Enables richer predictions','Can leverage pretrained encoders per modality'],cons:['Training is more complex','Data alignment across modalities can be tricky','Missing modalities require fallback strategies','Debugging is harder'],when_use:'When your problem naturally involves multiple data types and cross-modal relationships matter.',when_avoid:'When you have strong signal in a single modality and additional modalities would just add noise.',code:'# Keras functional API for multimodal\nimg_input = Input(shape=(224,224,3))\nimg_enc = ResNet50(include_top=False, pooling="avg")(img_input)\n\ntxt_input = Input(shape=(128,), dtype="int32")\ntxt_enc = Embedding(10000, 64)(txt_input)\ntxt_enc = GlobalAveragePooling1D()(txt_enc)\n\nmerged = Concatenate()([img_enc, txt_enc])\noutput = Dense(1, activation="sigmoid")(Dense(128, activation="relu")(merged))',related:['embeddings','transfer-learning'],dig_deeper:['<strong>Missing modality handling:</strong> Use learned default vectors or mask tokens when one modality is absent.','<strong>Modality dropout:</strong> Randomly zero out entire modality branches during training for robustness.','<strong>Vision-Language models:</strong> CLIP, Flamingo, and GPT-4V represent the frontier of multimodal architectures.','<strong>Paper:</strong> "Multimodal Machine Learning: A Survey and Taxonomy" — Baltrušaitis et al., 2019.'],quiz:{q:'What is the simplest fusion strategy for combining encoded representations from different modalities?',options:['Cross-attention between all modality pairs','Concatenation of the encoded vectors','Training separate models and averaging predictions','Using only the best-performing modality'],correct:1,explanation:'Concatenation simply stacks all encoded representations into a single long vector. It\'s the simplest fusion approach, though more sophisticated strategies can be more effective.'}}]},{id:'ch2',num:'02',title:'Problem Representation',color:'var(--ch2)',desc:'Patterns for reframing ML problems to make them easier to solve or improve model performance.',patterns:[{id:'reframing',title:'Reframing',oneliner:'Change the problem type (regression → classification or vice versa) to get better results.',problem:'Sometimes a problem framed as regression produces noisy, hard-to-train models, while the same problem framed as classification performs much better.',solution:'Reframe the problem type. Convert a regression target into bucketed classes, or turn a classification into a regression that predicts probabilities.',how_it_works:'<p><strong>Regression → Classification:</strong> Discretize continuous targets into bins. Instead of predicting exact house price ($347,200), predict a price range (300K-400K).</p><p><strong>Classification → Regression:</strong> Instead of predicting binary "will churn / won\'t churn", predict a churn probability score for more actionable information.</p><p><strong>Unstructured → Structured:</strong> Decompose a complex prediction into simpler sub-predictions.</p>',diagram:{title:'Reframing Approaches',nodes:['Original Problem\n"Predict Price"','Option A: Regression\nMSE Loss → $347K','Option B: Classification\nCE → "300K-400K"','Choose Based on\nBusiness Need']},insight:'The "right" problem framing isn\'t always the obvious one. Reframing is one of the highest-ROI things an ML practitioner can do — it\'s free in terms of data and often dramatically improves results.',pros:['Can dramatically improve model performance','No additional data collection needed','Often simplifies the loss function','Can better align with business metrics'],cons:['Discretization loses information','Choosing bin boundaries requires domain knowledge','May change what evaluation metrics are appropriate','Stakeholders may resist non-obvious framings'],when_use:'When your current formulation produces poor results, or when business cares about ranges rather than exact values.',when_avoid:'When the exact continuous value genuinely matters, or when your current framing is already performing well.',code:'# Reframing regression as classification\nimport pandas as pd\n\nbins = [0, 32, 50, 70, 85, 120]\nlabels = ["freezing","cold","mild","warm","hot"]\ndf["temp_class"] = pd.cut(df["temperature"], bins=bins, labels=labels)',related:['multilabel','neutral-class'],dig_deeper:['<strong>Ordinal regression:</strong> If bins have a natural order, consider ordinal regression to preserve ordering information.','<strong>Business alignment:</strong> Ask stakeholders "what decision do you make with this prediction?"','<strong>Multi-task reframing:</strong> Predict both the class and exact value simultaneously as auxiliary objectives.','<strong>Real example:</strong> Google Flights predicts flight delays as bucketed categories rather than exact minutes.'],quiz:{q:'When would reframing a regression as classification be beneficial?',options:['When exact numeric precision is critical','When the regression loss landscape is noisy and business needs ranges','When you have very few training examples','When the target variable is binary'],correct:1,explanation:'Reframing to classification is powerful when exact precision isn\'t needed and the continuous loss surface creates training difficulties.'}},{id:'multilabel',title:'Multilabel',oneliner:'Design the output layer to handle predictions where items can belong to multiple classes simultaneously.',problem:'Standard multi-class classification assumes each input belongs to exactly one class. But many real problems have overlapping labels.',solution:'Use independent sigmoid outputs (one per label) instead of a single softmax. Each output independently decides whether that label applies.',how_it_works:'<p>Replace the final softmax layer with <strong>N independent sigmoid neurons</strong>. Use <strong>binary cross-entropy loss</strong> summed across all labels.</p><p>At inference, apply a threshold (typically 0.5, but tunable) to each sigmoid output. You can use different thresholds per label.</p><p><strong>Label correlation:</strong> If labels are correlated, you can add explicit dependency structure — classifier chains or graph neural networks.</p>',diagram:{title:'Multilabel vs. Multiclass',nodes:['Shared\nBackbone','Sigmoid σ₁\nP(comedy)=0.9','Sigmoid σ₂\nP(romance)=0.7','Sigmoid σ₃\nP(action)=0.1']},insight:'The threshold per label is a powerful lever. For medical diagnosis, use low thresholds (catch everything); for content tagging, higher thresholds (fewer false tags).',pros:['Naturally handles overlapping categories','Each label\'s threshold is independently tunable','Scales to many labels','Doesn\'t force artificial mutual exclusivity'],cons:['More parameters in the output layer','Evaluation metrics are more complex','Imbalanced label distributions are common','Ignores label correlations unless explicitly modeled'],when_use:'Content tagging, medical diagnosis, multi-topic classification, attribute prediction.',when_avoid:'When labels are truly mutually exclusive (e.g., species identification).',code:'# PyTorch multilabel classifier\nclass MultiLabelModel(nn.Module):\n    def __init__(self, input_dim, num_labels):\n        super().__init__()\n        self.backbone = nn.Sequential(\n            nn.Linear(input_dim, 256), nn.ReLU(),\n            nn.Linear(256, 128), nn.ReLU())\n        self.heads = nn.Linear(128, num_labels)\n    def forward(self, x):\n        return torch.sigmoid(self.heads(self.backbone(x)))\n\nloss_fn = nn.BCELoss()  # NOT CrossEntropyLoss',related:['reframing','neutral-class','rebalancing'],dig_deeper:['<strong>Evaluation metrics:</strong> Use hamming loss, subset accuracy, or per-label F1. Avoid overall accuracy.','<strong>Classifier chains:</strong> Train label 2\'s classifier using label 1\'s prediction as additional input.','<strong>Extreme multilabel:</strong> With thousands of labels, use attention-based architectures or hierarchical label trees.','<strong>Threshold tuning:</strong> Optimize thresholds on validation set using your application metric.'],quiz:{q:'Why do we use sigmoid activations (not softmax) for multilabel classification?',options:['Sigmoid is computationally faster','Softmax forces outputs to sum to 1, preventing multiple labels','Sigmoid produces integers instead of probabilities','Softmax cannot handle more than 2 classes'],correct:1,explanation:'Softmax normalizes outputs to sum to 1, creating mutual exclusivity. Independent sigmoid functions let each label be assessed independently.'}},{id:'ensembles',title:'Ensembles',oneliner:'Combine multiple models to produce better predictions than any single model alone.',problem:'Single models have biases and variance. A model good at one part of the input space may be weak in another.',solution:'Train multiple diverse models and combine their predictions via averaging, voting, or a learned meta-model (stacking). Diversity is key.',how_it_works:'<p><strong>Bagging:</strong> Train the same algorithm on different random subsets. Random Forest is the canonical example. Reduces variance.</p><p><strong>Boosting:</strong> Train models sequentially, each focusing on previous errors. XGBoost, LightGBM. Reduces bias and variance.</p><p><strong>Stacking:</strong> Train a meta-model on base model predictions. Most flexible but most complex.</p><p><strong>Simple averaging:</strong> Average predictions of independently trained models. Surprisingly effective.</p>',diagram:{title:'Ensemble Architecture',nodes:['Input Data','Model A\n(DNN)','Model B\n(XGBoost)','Model C\n(Linear)','Combiner\navg/vote/stack','Final\nPrediction']},insight:'The secret to ensembles isn\'t having the best individual models — it\'s having diverse models that make uncorrelated errors. Three mediocre models that disagree differently will beat three excellent models that all fail on the same examples.',pros:['Nearly always improves over single models','Reduces both bias and variance','Provides uncertainty estimates','Kaggle-winning strategy for a reason'],cons:['Higher computational cost','More complex to deploy and maintain','Multiple monitoring pipelines','Diminishing returns after ~5-10 models'],when_use:'When you need maximum predictive performance and can afford the compute/complexity.',when_avoid:'When inference latency is critical, or when added complexity isn\'t worth marginal improvement.',code:'# Scikit-learn stacking ensemble\nfrom sklearn.ensemble import StackingClassifier\n\nensemble = StackingClassifier(\n    estimators=[\n        ("rf", RandomForestClassifier(n_estimators=100)),\n        ("gb", GradientBoostingClassifier(n_estimators=100)),\n        ("svc", SVC(probability=True))\n    ],\n    final_estimator=LogisticRegression(),\n    cv=5\n)',related:['cascade','checkpoints','hparam-tuning'],dig_deeper:['<strong>Diversity > accuracy:</strong> Ensemble error decreases with lower correlation between individual model errors.','<strong>Ensemble distillation:</strong> Train a "student" to mimic the ensemble. Most benefit at single-model cost.','<strong>Uncertainty estimation:</strong> Variance across ensemble members is a natural uncertainty measure.','<strong>Production tip:</strong> Run ensemble inference in parallel to keep latency manageable.'],quiz:{q:'What is the most critical factor for a successful ensemble?',options:['Each model must achieve >95% accuracy','Models should be trained identically','The individual models should make diverse, uncorrelated errors','The ensemble must contain at least 10 models'],correct:2,explanation:'Model diversity is the key. If all models make the same mistakes, combining them won\'t help.'}},{id:'cascade',title:'Cascade',oneliner:'Break a complex ML problem into a sequence of simpler, dependent stages.',problem:'Some problems are too complex for a single model. A staged approach where each stage simplifies the next often performs better.',solution:'Decompose into sequential stages. Early stages handle easy cases cheaply; later stages handle harder decisions with more expensive models.',how_it_works:'<p>Stage 1 is a cheap, fast model that handles the bulk of easy cases. Only hard/uncertain cases pass to Stage 2 (more expensive, accurate model). This continues for as many stages as needed.</p><p><strong>Example — Content moderation:</strong> Stage 1: keyword filter (fast). Stage 2: ML classifier for ambiguous cases. Stage 3: Human review for borderline decisions.</p>',diagram:{title:'Cascade Architecture',nodes:['All Inputs','Stage 1\nFast Filter','Easy → Done','Stage 2\nML Model','Hard → Stage 3','Complex\n/Human']},insight:'Cascades let you optimize for the common case. If 90% of inputs are easy, a cheap Stage 1 handles them quickly, and you only pay the cost of expensive models for the remaining 10%.',pros:['Dramatically reduces average inference cost','Each stage independently optimized','Gracefully handles varying difficulty','Can include human-in-the-loop stages'],cons:['Pipeline complexity and error propagation','Stage boundaries must be carefully designed','Errors in early stages can\'t be recovered','Monitoring at each stage needed'],when_use:'When inputs have varying difficulty levels, when inference cost matters, or when you need human-in-the-loop for edge cases.',when_avoid:'When all inputs are roughly equally difficult, or when pipeline latency is unacceptable.',code:'def cascade_predict(input):\n    conf_1, pred_1 = rule_based_model(input)\n    if conf_1 > 0.95:\n        return pred_1  # easy case\n    \n    conf_2, pred_2 = ml_model(input)\n    if conf_2 > 0.85:\n        return pred_2  # medium case\n    \n    return expert_review(input)  # hard case',related:['ensembles','two-phase-predictions'],dig_deeper:['<strong>Confidence calibration:</strong> Stage transitions depend on reliable confidence scores.','<strong>Cost-aware optimization:</strong> Set thresholds by jointly optimizing accuracy and computational cost.','<strong>Adaptive cascades:</strong> Dynamically adjust thresholds based on load or SLA requirements.','<strong>Multi-exit networks:</strong> BranchyNet adds classification heads at intermediate layers of a single network.'],quiz:{q:'Why is a cascade more efficient than running a complex model on all inputs?',options:['Complex models are always less accurate','Most inputs are easy; the cascade handles them cheaply and only escalates hard cases','Cascades use fewer total parameters','Simple models train faster'],correct:1,explanation:'The cascade exploits the fact that most real-world inputs are relatively easy.'}},{id:'neutral-class',title:'Neutral Class',oneliner:'Add an explicit "none of the above" class to handle ambiguous or out-of-scope inputs.',problem:'Standard classifiers must assign every input to a defined class, even when the input doesn\'t belong to any of them.',solution:'Add a neutral/other class trained on ambiguous, borderline, or out-of-scope examples. This gives the model a legitimate "I\'m not sure" option.',how_it_works:'<p>Create a new class label ("neutral", "other") populated with: (1) ambiguous cases annotators disagreed on, (2) out-of-scope inputs, (3) borderline cases near class boundaries.</p><p>At inference, "neutral" predictions trigger a fallback: human review, default response, or asking the user for clarification.</p>',diagram:{title:'Neutral Class Flow',nodes:['Input','Classifier\nN+1 classes','Class A/B/C\n→ Act','Neutral\n→ Fallback','Human Review\nor Default']},insight:'The neutral class acts as a pressure valve for your classifier. Without it, the model is forced to be wrong confidently. With it, the model can honestly say "I don\'t know."',pros:['Prevents forced misclassification','Honest uncertainty communication','Reduces false positive rate on core classes','Routes hard cases to human review'],cons:['Requires curating neutral class training data','Can become a dumping ground','Reduces overall "accuracy" metric','Requires downstream fallback strategy'],when_use:'Sentiment analysis, content classification, any domain where inputs can be ambiguous or out-of-scope.',when_avoid:'When every input genuinely belongs to exactly one class.',code:'label_map = {"positive": 0, "negative": 1, "neutral": 2}\n\n# At inference:\npred = model.predict(text)\nif pred == "neutral":\n    return default_response()  # or route to human',related:['reframing','multilabel','rebalancing'],dig_deeper:['<strong>Abstention learning:</strong> Train the model to learn when to abstain from prediction.','<strong>Selective prediction:</strong> Use confidence scores with a threshold as a simpler alternative.','<strong>Data sourcing:</strong> Use inter-annotator disagreement as a signal for neutral class examples.','<strong>Metric design:</strong> Report metrics on core classes separately from the neutral class.'],quiz:{q:'What is the main purpose of adding a neutral class?',options:['To increase training examples','To give the model a way to express uncertainty on ambiguous inputs','To simplify the model architecture','To speed up training'],correct:1,explanation:'The neutral class gives the model an honest "I don\'t know" option instead of forcing assignments.'}},{id:'rebalancing',title:'Rebalancing',oneliner:'Address class imbalance through data-level or algorithm-level techniques.',problem:'When one class vastly outnumbers others (e.g., 99% legitimate, 1% fraud), models learn to predict majority class for everything.',solution:'Downsample the majority, upsample the minority, use class-weighted loss, or generate synthetic examples (SMOTE).',how_it_works:'<p><strong>Downsampling:</strong> Remove majority class examples until balanced. Simple but wastes data.</p><p><strong>Upsampling:</strong> Duplicate minority examples with augmentation. Risks overfitting.</p><p><strong>Class weights:</strong> Multiply loss contribution of minority examples by inverse frequency weight.</p><p><strong>SMOTE:</strong> Synthetically generate new minority examples by interpolating between existing ones.</p>',diagram:{title:'Rebalancing Strategies',nodes:['Imbalanced Data\n99:1 ratio','Downsample\nMajority','Upsample\nMinority','Weighted\nLoss','Synthetic\nSMOTE']},insight:'Class weights in the loss function are often the best first approach — they require no data modification and let the optimizer naturally adjust.',pros:['Enables learning minority class patterns','Multiple strategies available','Class weights are zero-cost to implement','Critical for high-stakes minority class problems'],cons:['Downsampling wastes majority class data','Upsampling/SMOTE can introduce overfitting','Finding the right balance ratio requires tuning','Evaluation must use appropriate metrics (not accuracy!)'],when_use:'Whenever class distribution is significantly skewed (>5:1 ratio) and the minority class is what you care about.',when_avoid:'When the class imbalance reflects the true distribution AND your evaluation metric accounts for it.',code:'# Class-weighted loss in PyTorch\nclass_counts = [9900, 100]\nweights = torch.tensor([1.0/c for c in class_counts])\nweights = weights / weights.sum() * len(weights)\nloss_fn = nn.CrossEntropyLoss(weight=weights)\n\n# SMOTE\nfrom imblearn.over_sampling import SMOTE\nX_res, y_res = SMOTE().fit_resample(X_train, y_train)',related:['neutral-class','reframing','multilabel'],dig_deeper:['<strong>Evaluation:</strong> NEVER use accuracy for imbalanced classes. Use AUC-PR, F1, or MCC.','<strong>Focal loss:</strong> Dynamically down-weights easy examples. Popular in object detection.','<strong>Cost-sensitive learning:</strong> Assign different misclassification costs per class pair.','<strong>Stratified splitting:</strong> Always use stratified train/test splits to preserve class ratios.'],quiz:{q:'Why is accuracy misleading for imbalanced datasets?',options:['Accuracy cannot be computed for classification','A model predicting only the majority class achieves very high accuracy while being useless','Accuracy is only valid for regression','Imbalanced datasets always have accuracy below 50%'],correct:1,explanation:'With 99:1 ratio, always predicting majority class gets 99% accuracy but catches zero minority cases.'}}]},{id:'ch3',num:'03',title:'Model Training',color:'var(--ch3)',desc:'Patterns for making model training more effective, efficient, and reliable.',patterns:[{id:'useful-overfitting',title:'Useful Overfitting',oneliner:'Deliberately overfit when the training data covers the entire input space or memorization is the goal.',problem:'We\'re taught overfitting is always bad. But sometimes the training data IS the complete population.',solution:'If training data fully represents inference distribution, let the model overfit. Don\'t apply regularization that prevents learning the training data perfectly.',how_it_works:'<p>Overfitting is only problematic when the model must generalize to unseen data. Legitimate cases where training data covers everything:</p><p><strong>Simulation models:</strong> Physics simulators with all possible input configurations.</p><p><strong>Lookup replacement:</strong> Neural network replacing a complex lookup table.</p><p><strong>Interpolation:</strong> When you need smooth predictions between known data points.</p>',diagram:{title:'When Overfitting is Useful',nodes:['Full Population\nData','Model Trained\nto Zero Loss','Inference on\nSame Population','Perfect Recall\n= Goal']},insight:'The question isn\'t "is my model overfitting?" but "will inference data come from the same distribution as training data?" If yes, overfitting is just good memorization.',pros:['Maximum fidelity to known data','Simplifies training (no regularization tuning)','Neural network as fast function approximator','Can replace expensive simulations'],cons:['Catastrophically wrong on out-of-distribution inputs','No generalization guarantee','Must be sure training data is complete','Monitoring for distribution shift is critical'],when_use:'Simulation replacement, lookup table replacement, known-population problems, interpolation.',when_avoid:'Any problem where you expect inputs different from training data. Which is most problems.',code:'# Neural network replacing a physics simulator\nmodel = nn.Sequential(\n    nn.Linear(input_dim, 512), nn.ReLU(),\n    nn.Linear(512, 512), nn.ReLU(),\n    nn.Linear(512, output_dim)\n)\n# No dropout, no weight decay, train until loss ≈ 0',related:['checkpoints','hparam-tuning'],dig_deeper:['<strong>Distribution monitoring:</strong> Deploy input validators that flag inference inputs different from training.','<strong>Physics-informed neural networks (PINNs):</strong> Intentionally memorize known physical equations.','<strong>Grokking:</strong> Recent research shows models can suddenly generalize long after overfitting.'],quiz:{q:'When is deliberately overfitting a model appropriate?',options:['When you have very little training data','When training data covers the entire input space the model will encounter','When you want to minimize training time','When regularization is too complex to implement'],correct:1,explanation:'Overfitting is appropriate when the training data IS the complete population.'}},{id:'checkpoints',title:'Checkpoints',oneliner:'Periodically save model state during training to enable recovery, early stopping, and model selection.',problem:'Training runs can crash, diverge, or go through phases. Without checkpoints, you lose everything.',solution:'Save model weights, optimizer state, and metrics at regular intervals. Use validation metrics to identify the best checkpoint. Implement early stopping.',how_it_works:'<p>At regular intervals, serialize model weights, optimizer state, and metrics. Track validation loss at each checkpoint.</p><p><strong>Early stopping:</strong> If validation loss hasn\'t improved for <code>patience</code> checkpoints, stop and roll back to best.</p><p><strong>Model selection:</strong> Deploy the best checkpoint (not the final one!) — the final checkpoint often shows degraded validation performance.</p>',diagram:{title:'Checkpoint & Early Stopping',nodes:['Training\nLoop','Save Every\nN Steps','Track\nVal Metric','Best?\n→ Save','No Improve\nfor P Steps?','Early Stop\n→ Use Best']},insight:'The model you deploy should almost never be the last checkpoint. Training typically overshoots the optimal point.',pros:['Recovery from crashes and failures','Enables early stopping (key regularization technique)','Model selection from training history','Supports fine-tuning from intermediate checkpoints'],cons:['Disk space for storing many checkpoints','I/O overhead during training','Must implement cleanup logic','Requires validation data for early stopping'],when_use:'Always. Every serious training run should use checkpoints.',when_avoid:'Extremely short training runs (<1 minute).',code:'best_val_loss = float("inf")\npatience_counter = 0\n\nfor epoch in range(max_epochs):\n    train_one_epoch(model, train_loader)\n    val_loss = evaluate(model, val_loader)\n    \n    if val_loss < best_val_loss:\n        best_val_loss = val_loss\n        patience_counter = 0\n        torch.save({"model": model.state_dict(),\n                    "val_loss": val_loss}, "best.pt")\n    else:\n        patience_counter += 1\n        if patience_counter >= 5:\n            break  # early stop',related:['useful-overfitting','transfer-learning','hparam-tuning'],dig_deeper:['<strong>Checkpoint averaging:</strong> Average weights from the last K checkpoints for a simple ensemble-like boost.','<strong>EMA:</strong> Maintain exponential moving average of weights — often produces a better final model.','<strong>Cloud storage:</strong> Save to S3/GCS to survive instance termination.','<strong>Multi-metric selection:</strong> Use multiple validation metrics, not just loss.'],quiz:{q:'Why deploy the best checkpoint rather than the final one?',options:['The final checkpoint uses too much memory','Training often overshoots the optimum, so later checkpoints may show worse validation performance','The first checkpoint is always best','Checkpoints near the end are corrupted'],correct:1,explanation:'Models often start overfitting after reaching peak validation performance. The final checkpoint has continued past this optimum.'}},{id:'transfer-learning',title:'Transfer Learning',oneliner:'Initialize with weights pretrained on a large dataset, then fine-tune on your smaller task-specific dataset.',problem:'Many tasks have limited labeled data. Training from scratch with small datasets leads to overfitting.',solution:'Start with a pretrained model (ImageNet for vision, BookCorpus for language). Replace final layers for your task and fine-tune.',how_it_works:'<p><strong>Feature extraction:</strong> Freeze pretrained backbone, only train the new head. Fastest approach.</p><p><strong>Fine-tuning:</strong> Unfreeze some or all pretrained layers, train with small learning rate.</p><p><strong>Progressive unfreezing:</strong> Start with only head unfrozen, gradually unfreeze deeper layers to prevent catastrophic forgetting.</p>',diagram:{title:'Transfer Learning Pipeline',nodes:['Pretrained Model\n(BERT, ResNet)','Freeze Lower\nLayers','Replace Head\nfor New Task','Fine-tune on\nYour Data','Task-Specific\nModel']},insight:'Transfer learning is the default approach in modern ML. Training from scratch is increasingly rare. The question is which pretrained model to start from and how many layers to fine-tune.',pros:['Dramatically reduces data requirements','Faster convergence','Leverages features from massive datasets','Works across domains'],cons:['Domain gap may limit transfer','Risk of catastrophic forgetting','Large pretrained models need significant memory','Pretrained biases transfer too'],when_use:'Almost always for images, text, or audio. Especially when you have <10K labeled examples.',when_avoid:'When your domain is radically different from pretraining domain, or when you have abundant task-specific data.',code:'# Hugging Face transfer learning\nfrom transformers import AutoModelForSequenceClassification\n\nmodel = AutoModelForSequenceClassification.from_pretrained(\n    "bert-base-uncased", num_labels=3\n)\n\n# Freeze base (feature extraction mode)\nfor param in model.bert.parameters():\n    param.requires_grad = False',related:['embeddings','checkpoints','distribution-strategy'],dig_deeper:['<strong>Domain-adaptive pretraining:</strong> Continue pretraining on your domain\'s unlabeled data before fine-tuning.','<strong>LoRA/QLoRA:</strong> Parameter-efficient fine-tuning that trains small adapter layers instead of the full model.','<strong>Few-shot:</strong> Large language models can perform tasks with just a few examples in the prompt.','<strong>Paper:</strong> "Universal Language Model Fine-tuning for Text Classification" — Howard & Ruder, 2018.'],quiz:{q:'What is the key advantage of progressive unfreezing?',options:['Speeds up training by 10x','Prevents catastrophic forgetting by gradually adapting layers','Eliminates the need for labeled data','Automatically selects the best learning rate'],correct:1,explanation:'Progressive unfreezing gives each layer time to adapt without abruptly destroying pretrained features.'}},{id:'distribution-strategy',title:'Distribution Strategy',oneliner:'Distribute training across multiple GPUs or machines to handle large models and datasets.',problem:'Modern models are too large for one GPU. Training BERT takes days on one GPU. GPT-scale is impossible without distribution.',solution:'Use data parallelism (same model, different data per GPU), model parallelism (split model across GPUs), or FSDP/ZeRO (shard everything).',how_it_works:'<p><strong>Data parallelism:</strong> Replicate model on each GPU, each processes different mini-batch. Gradients averaged via all-reduce. Easiest to implement.</p><p><strong>Model parallelism:</strong> Split model layers across GPUs. Necessary when model doesn\'t fit on one GPU.</p><p><strong>FSDP/ZeRO:</strong> Shard parameters, gradients, and optimizer states. Best of both worlds for very large models.</p>',diagram:{title:'Data Parallelism',nodes:['Training Data','Split into\nMini-batches','GPU 1\nFull Copy','GPU 2\nFull Copy','All-Reduce\nGradients','Synchronized\nUpdate']},insight:'Data parallelism with synchronized SGD is mathematically equivalent to training with a larger batch size. Scale learning rate linearly with the number of GPUs.',pros:['Enables training models too large for one GPU','Dramatically reduces wall-clock time','Data parallelism is nearly plug-and-play','FSDP removes memory limits'],cons:['Communication overhead between GPUs','Linear scaling rule doesn\'t always hold','Debugging distributed training is hard','Careful batch size and LR tuning required'],when_use:'Whenever training takes too long or model/data doesn\'t fit on one GPU.',when_avoid:'When model and data fit comfortably on one GPU.',code:'# PyTorch DDP\nimport torch.distributed as dist\nfrom torch.nn.parallel import DistributedDataParallel as DDP\n\ndist.init_process_group("nccl")\nlocal_rank = int(os.environ["LOCAL_RANK"])\nmodel = DDP(MyModel().to(local_rank), device_ids=[local_rank])',related:['checkpoints','transfer-learning'],dig_deeper:['<strong>Linear scaling rule:</strong> When multiplying batch size by K GPUs, multiply LR by K with warmup.','<strong>Gradient accumulation:</strong> Simulate larger batches on fewer GPUs.','<strong>Mixed precision (AMP):</strong> FP16 computation, FP32 accumulation. Nearly 2x speedup.','<strong>DeepSpeed:</strong> Microsoft\'s library for ZeRO stages 1-3 for trillion-parameter models.'],quiz:{q:'In data parallelism, what happens after each GPU computes gradients?',options:['Each GPU updates independently','Gradients are averaged across all GPUs (all-reduce) before updating','Only GPU 0 computes the update','Gradients are discarded'],correct:1,explanation:'Gradients from all GPUs are combined via all-reduce to compute a single synchronized update.'}},{id:'hparam-tuning',title:'Hyperparameter Tuning',oneliner:'Systematically search for optimal hyperparameters using automated techniques.',problem:'Model performance is highly sensitive to hyperparameters. Manual tuning is slow, biased, and doesn\'t scale.',solution:'Use grid search, random search, or Bayesian optimization. Define search space, objective, and budget, then let the algorithm explore.',how_it_works:'<p><strong>Grid search:</strong> Try every combination. Exhaustive but exponentially expensive.</p><p><strong>Random search:</strong> Sample randomly. Surprisingly effective — covers more of each dimension than grid search.</p><p><strong>Bayesian optimization:</strong> Build a probabilistic surrogate model to choose the most promising configs. Efficient for expensive evaluations.</p><p><strong>Hyperband/ASHA:</strong> Start many configs with small budgets. Kill underperformers early. Promote promising ones.</p>',diagram:{title:'HPO Loop',nodes:['Define\nSearch Space','Select Config\n(Random/Bayes)','Train Model','Evaluate on\nValidation','Update Surrogate\nor Prune','Best Config\n→ Final Train']},insight:'Random search beats grid search because it explores more unique values of each hyperparameter. If learning rate matters but batch size doesn\'t, grid wastes trials on different batch sizes at the same LR.',pros:['Finds better configs than manual tuning','Removes human bias','Discovers non-obvious interactions','Automated and reproducible'],cons:['Computational cost','Search space definition requires expertise','Overfitting to validation set','Bayesian optimization doesn\'t parallelize as naturally'],when_use:'Always, at least random search. Bayesian for expensive runs. Hyperband for early evaluation.',when_avoid:'During rapid prototyping before stabilizing data pipeline — tune last, not first.',code:'# Optuna Bayesian optimization\nimport optuna\n\ndef objective(trial):\n    lr = trial.suggest_float("lr", 1e-5, 1e-1, log=True)\n    hidden = trial.suggest_int("hidden", 64, 512)\n    dropout = trial.suggest_float("dropout", 0.0, 0.5)\n    return train_and_evaluate(lr, hidden, dropout)\n\nstudy = optuna.create_study(direction="minimize")\nstudy.optimize(objective, n_trials=100)',related:['checkpoints','useful-overfitting','ensembles'],dig_deeper:['<strong>Log-scale for LR:</strong> Always search learning rate on log scale (1e-5 to 1e-1).','<strong>Multi-fidelity:</strong> Hyperband evaluates many configs cheaply (few epochs) and invests in the best.','<strong>Population-based training:</strong> Evolves hyperparameters during training.','<strong>Paper:</strong> "Random Search for Hyper-Parameter Optimization" — Bergstra & Bengio, 2012.'],quiz:{q:'Why does random search often outperform grid search?',options:['Random search uses a smarter algorithm','Random search explores more unique values per dimension','Grid search cannot handle continuous parameters','Random search applies early stopping'],correct:1,explanation:'Grid search reuses the same values of each parameter across combinations, while random search samples different values every trial.'}}]},{id:'ch4',num:'04',title:'Resilient Serving',color:'var(--ch4)',desc:'Patterns for deploying models reliably in production with low latency and graceful degradation.',patterns:[{id:'stateless-serving',title:'Stateless Serving Function',oneliner:'Export the trained model as a stateless function with no side effects for horizontal scaling.',problem:'Training is batch-oriented and stateful. Serving must be low-latency and horizontally scalable. Coupling them is a recipe for disaster.',solution:'Export the model as a self-contained, stateless function. Loads weights once at startup, processes each request independently. No shared state enables horizontal scaling.',how_it_works:'<p>The serving function should be <strong>pure</strong>: same input → same output, no side effects. This enables horizontal scaling (N replicas behind a load balancer), caching, and A/B testing.</p><p>Common formats: TF SavedModel, ONNX, TorchScript, or REST/gRPC APIs.</p>',diagram:{title:'Stateless Serving',nodes:['Client','Load\nBalancer','Replica 1\nv2.1','Replica 2\nv2.1','Replica N\nv2.1','Response']},insight:'Stateless serving is what makes ML engineering "just engineering." All standard web service patterns (load balancing, auto-scaling, health checks) work out of the box.',pros:['Horizontally scalable','Simple deployment and rollback','Standard load balancing and health checks','Easy A/B testing and canary deploys'],cons:['Cold start from model loading','Large models consume memory per replica','No session state (needs external storage)','Preprocessing must be included in serving function'],when_use:'Almost all production ML serving. This is the default pattern.',when_avoid:'When requests genuinely need session context, though even these can use external state stores.',code:'# FastAPI stateless serving\nfrom fastapi import FastAPI\n\napp = FastAPI()\nmodel = torch.jit.load("model.pt")\nmodel.eval()\n\n@app.post("/predict")\nasync def predict(features: dict):\n    tensor = preprocess(features)\n    with torch.no_grad():\n        pred = model(tensor)\n    return {"prediction": pred.tolist()}',related:['batch-serving','two-phase-predictions','keyed-predictions'],dig_deeper:['<strong>Model warmup:</strong> Send synthetic requests at startup before accepting real traffic.','<strong>Health checks:</strong> Implement both liveness and readiness probes.','<strong>Model serialization:</strong> TorchScript/ONNX remove Python dependency.','<strong>Triton Inference Server:</strong> NVIDIA\'s solution with dynamic batching.'],quiz:{q:'What property of stateless serving enables horizontal scaling?',options:['Replicas share weights via network','Each replica processes requests independently with no shared state','Stateless functions are faster','Load balancers only work with stateless services'],correct:1,explanation:'Independent replicas with no shared state means you can add replicas freely behind a load balancer.'}},{id:'batch-serving',title:'Batch Serving',oneliner:'Run predictions offline, store results, and serve from a lookup table.',problem:'Real-time prediction for every request is expensive. For many use cases, daily or hourly updates are sufficient.',solution:'Periodically run the model on all relevant inputs in a batch job. Store predictions in a low-latency store. Serve via lookup. Falls back to online prediction for cache misses.',how_it_works:'<p>A scheduled pipeline runs predictions for all known entities. Results go to a low-latency store (Redis, DynamoDB). At serving time, the API looks up pre-computed predictions.</p><p><strong>Hybrid approach:</strong> Pre-compute for known entities. Fall back to real-time model for unknowns.</p>',diagram:{title:'Batch Serving Pipeline',nodes:['Scheduled\nJob','Run Model on\nAll Entities','Store in\nCache/DB','Serve via\nLookup','Miss?\n→ Real-time']},insight:'Batch serving lets you use much more complex models than real-time serving allows. With hours to compute, you can run ensembles, graph networks, or heavy feature engineering.',pros:['Very low serving latency (just lookup)','Allows complex models','Simple serving infrastructure','Predictable compute costs'],cons:['Predictions can be stale','Must handle cache misses','Storage proportional to entities','Model changes require re-computation'],when_use:'When predictions tolerate staleness and the entity set is known and bounded.',when_avoid:'When predictions must reflect real-time context.',code:'# Batch prediction pipeline\ndef batch_predict_job():\n    users = pd.read_sql("SELECT * FROM active_users", db)\n    preds = model.predict(build_features(users))\n    r = Redis()\n    for uid, pred in zip(users.user_id, preds):\n        r.set(f"rec:{uid}", json.dumps(pred), ex=86400)\n\ndef serve(user_id):\n    cached = r.get(f"rec:{user_id}")\n    return json.loads(cached) if cached else realtime_fallback(user_id)',related:['stateless-serving','keyed-predictions','workflow-pipeline'],dig_deeper:['<strong>Materialized views:</strong> Think of batch predictions as materialized views of the model.','<strong>Staleness budget:</strong> Define how stale predictions can be.','<strong>Incremental batch:</strong> Only re-compute for entities whose features changed.','<strong>Lambda architecture:</strong> Combine batch (accurate, high latency) with real-time (lower accuracy, low latency).'],quiz:{q:'What is the primary advantage of batch serving over real-time prediction?',options:['Batch predictions are always more accurate','You can use much more complex models since latency doesn\'t matter','Batch serving requires no model','It eliminates feature engineering'],correct:1,explanation:'Without latency constraints, you can use expensive models that would be impossible in real-time.'}},{id:'continued-evaluation',title:'Continued Model Evaluation',oneliner:'Continuously monitor model performance in production to detect degradation from data drift.',problem:'A model that performs well at deployment can silently degrade as the real world changes.',solution:'Implement continuous evaluation: compare predictions against delayed ground truth, monitor input feature distributions, and track prediction distribution shifts.',how_it_works:'<p><strong>Ground truth monitoring:</strong> Compute metrics against delayed ground truth and compare to baseline.</p><p><strong>Data drift detection:</strong> Monitor feature distributions using KS test, PSI to detect shifts.</p><p><strong>Prediction drift:</strong> Monitor output distributions for unusual patterns.</p><p><strong>Concept drift:</strong> When the relationship between features and targets changes. Requires ground truth.</p>',diagram:{title:'Monitoring Pipeline',nodes:['Production\nTraffic','Log Predictions\n& Features','Ground Truth\n(Delayed)','Compute Metrics\nvs. Baseline','Drift Detection','Alert &\nRetrain']},insight:'The most dangerous failure is silent degradation. The model returns 200 OK but predictions are increasingly wrong. Continuous evaluation is your smoke detector.',pros:['Catches degradation before business impact','Data-driven retraining decisions','Audit trail of performance','Distinguishes data drift from concept drift'],cons:['Ground truth often delayed','Significant logging infrastructure','Alert fatigue from noisy detectors','Sudden breaks need different detection'],when_use:'Every production model. No exceptions.',when_avoid:'Never avoid it.',code:'import numpy as np\n\ndef compute_psi(expected, actual, bins=10):\n    """Population Stability Index"""\n    e_hist, edges = np.histogram(expected, bins=bins)\n    a_hist, _ = np.histogram(actual, bins=edges)\n    e_pct = e_hist / len(expected) + 1e-6\n    a_pct = a_hist / len(actual) + 1e-6\n    return np.sum((a_pct - e_pct) * np.log(a_pct / e_pct))\n\n# PSI > 0.2 suggests significant drift',related:['stateless-serving','workflow-pipeline','model-versioning'],dig_deeper:['<strong>Evidently AI:</strong> Open-source library for data drift and model monitoring.','<strong>Shadow mode:</strong> Run new model in parallel, comparing outputs without serving.','<strong>Window-based monitoring:</strong> Compare rolling windows (last hour vs. last month).','<strong>Automated retraining:</strong> Trigger retraining based on drift thresholds rather than fixed schedules.'],quiz:{q:'What is the most dangerous type of model failure?',options:['The model crashes','Silent degradation — it keeps serving but predictions get increasingly wrong','The model becomes slow','Memory overflow'],correct:1,explanation:'Silent degradation is most dangerous because the system appears healthy while predictions become inaccurate.'}},{id:'two-phase-predictions',title:'Two-Phase Predictions',oneliner:'Fast online phase delivers immediate results; slower offline phase refines them asynchronously.',problem:'Some predictions need to be both instant AND highly accurate. You can\'t have both with one model.',solution:'Phase 1: fast model serves immediately. Phase 2: accurate but slower model asynchronously refines the prediction.',how_it_works:'<p><strong>Phase 1:</strong> Lightweight model meets latency SLA instantly.</p><p><strong>Phase 2:</strong> Heavy model processes asynchronously and pushes updated results.</p><p>Ubiquitous in search engines and recommendations: initial results in milliseconds, refinements follow.</p>',diagram:{title:'Two-Phase Prediction',nodes:['User Request','Phase 1: Fast\nSimple Model','Immediate\nResponse','Phase 2: Accurate\nComplex Model','Async Update']},insight:'The two-phase approach recognizes that "good enough now" is often more valuable than "perfect later." You get speed AND accuracy, just not simultaneously.',pros:['Meets strict latency SLAs while maximizing accuracy','Graceful degradation if Phase 2 fails','Each phase uses optimal architecture','Standard at Google, Netflix, Amazon'],cons:['More complex infrastructure','Phase 2 updates may cause visible result changes','Two models to maintain','Must define "update" UX'],when_use:'Search, recommendations, ad ranking — anywhere that serves results immediately but can refine.',when_avoid:'When Phase 2 results arrive too late to be useful.',code:'async def handle_request(query):\n    fast_results = fast_model.predict(query)  # <10ms\n    await send_response(format_results(fast_results))\n    asyncio.create_task(refine(query, fast_results))\n\nasync def refine(query, initial):\n    refined = heavy_model.predict(query)  # 200ms+\n    await push_update(refined)  # WebSocket/SSE',related:['stateless-serving','cascade','batch-serving'],dig_deeper:['<strong>Retrieval + Ranking:</strong> Phase 1 retrieves 1000 candidates cheaply, Phase 2 re-ranks top 100.','<strong>Speculative execution:</strong> Run Phase 2 on likely inputs before the user requests them.','<strong>Progressive rendering:</strong> UI patterns for graceful Phase 1 → Phase 2 transitions.'],quiz:{q:'What is the primary goal of two-phase predictions?',options:['Train two models simultaneously','Meet latency SLAs with a fast model while improving accuracy asynchronously','Replace model monitoring','Reduce total predictions'],correct:1,explanation:'Phase 1 meets latency requirements; Phase 2 improves accuracy asynchronously.'}},{id:'keyed-predictions',title:'Keyed Predictions',oneliner:'Include a pass-through key in each prediction request for reliable result-to-input joining.',problem:'In batch prediction, it\'s unclear which prediction corresponds to which input record without an explicit key.',solution:'Include a key field that the model ignores but the infrastructure passes through. The client uses it to join predictions to original records.',how_it_works:'<p>Each request includes a <code>key</code> (user_id, transaction_id) that the model ignores but the serving system returns alongside the prediction.</p><p>Critical for batch and async APIs where responses may arrive out of order.</p>',diagram:{title:'Keyed Prediction',nodes:['Send\n{key:"txn_42"}','Model Ignores\nkey','Response\n{key:"txn_42", p:0.87}','Client Joins\non key']},insight:'This pattern is trivially simple but its absence causes real production bugs. Any batch API without keyed predictions forces dangerous ordering assumptions.',pros:['Reliable join between inputs and predictions','Works with out-of-order async responses','Model doesn\'t need to know about keys','Simple to implement'],cons:['Slight per-request overhead','Key must be unique per batch','Client must supply meaningful keys','Not needed for single synchronous requests'],when_use:'Batch prediction APIs, async APIs, or when multiple predictions need matching to inputs.',when_avoid:'Simple synchronous single-prediction endpoints.',code:'@dataclass\nclass PredRequest:\n    key: str\n    features: dict\n\ndef batch_predict(requests):\n    features = [r.features for r in requests]\n    preds = model.predict(features)\n    return [{\"key\": r.key, \"pred\": p}\n            for r, p in zip(requests, preds)]',related:['batch-serving','stateless-serving'],dig_deeper:['<strong>Idempotency:</strong> Use the key for idempotent retries — same key returns cached result.','<strong>BigQuery ML:</strong> Natively supports keyed predictions via ML.PREDICT.','<strong>Streaming:</strong> In Kafka/Pub-Sub, the key correlates request and response events.','<strong>Error handling:</strong> Return key with error status instead of silently dropping.'],quiz:{q:'Why is keyed prediction essential for batch APIs?',options:['The model needs the key as a feature','Keys make predictions more accurate','Without keys, you cannot reliably match predictions to inputs','Keys reduce latency'],correct:2,explanation:'In batch predictions, results may arrive out of order. The key lets clients reliably join predictions to inputs.'}}]},{id:'ch5',num:'05',title:'Reproducibility',color:'var(--ch5)',desc:'Patterns for making ML pipelines reproducible, auditable, and maintainable.',patterns:[{id:'transform',title:'Transform',oneliner:'Keep feature engineering identical between training and serving to prevent training-serving skew.',problem:'Training preprocesses data in a notebook. Serving preprocesses in a Java service. Subtle differences cause training-serving skew — the #1 ML production bug.',solution:'Define transformations once in a shared format. Use the same code in both pipelines. Serialize learned statistics (mean, std) from training and apply them unchanged at serving time.',how_it_works:'<p><strong>Training-serving skew</strong> happens when preprocessing differs between training and serving. Even small differences (different normalization, different tokenization) cause dramatic a
