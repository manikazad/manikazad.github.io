<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practical MLOps — Interactive Learning System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090b;--bg2:#0d0f13;--bg3:#12141a;--bg4:#181b22;--bg5:#1e212a;
  --bd:#1c1f28;--bd2:#282c38;
  --t1:#e6e8ee;--t2:#9499a6;--t3:#5a5f6e;
  --cyan:#00d4ff;--cyanA:rgba(0,212,255,.1);
  --green:#00e87b;--greenA:rgba(0,232,123,.1);
  --amber:#f5a623;--amberA:rgba(245,166,35,.1);
  --red:#f74a6a;--redA:rgba(247,74,106,.1);
  --purple:#a78bfa;--purpleA:rgba(167,139,250,.1);
  --blue:#60a5fa;--blueA:rgba(96,165,250,.1);
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'DM Sans',system-ui,-apple-system,sans-serif;
  --serif:'Playfair Display',Georgia,serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:15px;line-height:1.7}
::selection{background:rgba(0,212,255,.2)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

#app{display:flex;min-height:100vh}
#sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;z-index:10}
#main{flex:1;min-width:0}
.vp{max-width:880px;margin:0 auto;padding:36px 40px 80px}

.s-head{padding:20px 18px 14px;border-bottom:1px solid var(--bd)}
.s-logo{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--cyan)}
.s-title{font-family:var(--serif);font-size:20px;font-style:italic;color:var(--t1);margin-top:2px}
.s-sub{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:4px}
.s-search{padding:10px 14px;border-bottom:1px solid var(--bd)}
.s-search input{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--t1);font-family:var(--mono);font-size:11px;outline:none}
.s-search input:focus{border-color:var(--cyan)}
.s-search input::placeholder{color:var(--t3)}
.s-nav{flex:1;overflow-y:auto;padding:8px 0}
.s-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:14px 18px 4px}
.s-item{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;font-size:12.5px;color:var(--t2);border-left:2px solid transparent;transition:all .12s}
.s-item:hover{background:var(--bg3);color:var(--t1)}
.s-item.on{background:var(--cyanA);color:var(--cyan);border-left-color:var(--cyan)}
.s-num{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:20px}
.s-item.on .s-num{color:var(--cyan)}
.s-foot{padding:14px 18px;border-top:1px solid var(--bd)}
.s-foot .lbl{font-family:var(--mono);font-size:9px;color:var(--t3);display:flex;justify-content:space-between;margin-bottom:5px}
.pbar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .4s;border-radius:2px}

#mobileBar{display:none;position:sticky;top:0;z-index:20;background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 14px;align-items:center;gap:10px}
#mobileBar button{background:none;border:none;color:var(--t1);font-size:18px;cursor:pointer}
#mobileBar span{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:1.5px}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9}
@media(max-width:780px){
  #mobileBar{display:flex}
  #sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .25s;z-index:15}
  #sidebar.open{transform:translateX(0)}
  #overlay.open{display:block}
  .vp{padding:20px 16px 60px}
  .ch-title{font-size:26px!important}
  .ctx-grid{grid-template-columns:1fr!important}
}

.ch-head{margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid var(--bd)}
.ch-badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);background:var(--cyanA);padding:3px 12px;border-radius:14px;margin-bottom:12px}
.ch-title{font-family:var(--serif);font-size:36px;font-style:italic;line-height:1.15;color:var(--t1);margin-bottom:10px}
.ch-sub{font-size:15px;color:var(--t2);max-width:620px;line-height:1.65}

.sec{margin-bottom:40px}
.sh{font-size:21px;font-weight:600;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sh .ico{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--cyanA);border-radius:5px;font-size:13px}
.st{color:var(--t2);margin-bottom:14px;line-height:1.8}
.st strong{color:var(--t1);font-weight:500}

.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.ctx{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:14px 16px;cursor:pointer;transition:all .15s}
.ctx:hover{border-color:var(--bd2);background:var(--bg4)}
.ctx.exp{grid-column:1/-1;border-color:var(--cyan);background:var(--cyanA)}
.ctx .ql{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);margin-bottom:4px}
.ctx .qt{font-weight:500;font-size:13.5px;color:var(--t1)}
.ctx .qa{font-size:13px;color:var(--t2);line-height:1.7;display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.ctx.exp .qa{display:block}

.dbox{background:var(--bg3);border:1px solid var(--bd);border-radius:9px;padding:20px;margin:18px 0}
.dbox-t{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.dbox-t::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.flow{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;padding:10px 0}
.fnode{background:var(--bg4);border:1px solid var(--bd2);border-radius:7px;padding:10px 16px;text-align:center;min-width:100px;cursor:pointer;transition:all .15s}
.fnode:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 0 16px rgba(0,212,255,.1)}
.fnode .nl{font-size:12px;font-weight:500;color:var(--t1)}
.fnode .nd{font-size:9px;color:var(--t3);font-family:var(--mono);margin-top:2px}
.farr{color:var(--t3);font-size:16px;padding:0 5px;user-select:none}
.fdp{background:var(--bg4);border:1px solid var(--bd);border-radius:7px;padding:14px 16px;margin-top:12px;font-size:13px;color:var(--t2);line-height:1.7;display:none}
.fdp.vis{display:block}

.pyr{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 0}
.plvl{display:flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;border:1px solid transparent;transition:all .15s}
.plvl:hover{transform:scale(1.02);border-color:currentColor}

.cblk{background:#090b0f;border:1px solid var(--bd);border-radius:7px;margin:14px 0;overflow:hidden}
.cblk-h{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--bd)}
.cblk-l{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--t3)}
.cblk-c{font-family:var(--mono);font-size:10px;color:var(--t3);cursor:pointer;background:none;border:1px solid var(--bd);padding:1px 8px;border-radius:3px}
.cblk-c:hover{color:var(--cyan);border-color:var(--cyan)}
.cblk-b{padding:14px;font-family:var(--mono);font-size:12px;line-height:1.7;color:#c0c8d4;overflow-x:auto;white-space:pre}

.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin:16px 0}
.ccard{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:16px;cursor:pointer;transition:all .15s}
.ccard:hover{border-color:var(--bd2);transform:translateY(-1px)}
.ccard .ci{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:16px;margin-bottom:10px}
.ccard .ct{font-weight:600;font-size:14px;color:var(--t1);margin-bottom:4px}
.ccard .cd{font-size:12px;color:var(--t2);line-height:1.6}
.ccard .cx{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);font-size:12px;color:var(--t2);line-height:1.7}
.ccard.exp .cx{display:block}

.ctbl{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.ctbl th{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--t3);padding:8px 14px;text-align:left;border-bottom:1px solid var(--bd);background:var(--bg3)}
.ctbl td{padding:10px 14px;border-bottom:1px solid var(--bd);color:var(--t2)}
.ctbl tr:hover td{background:var(--bg3);color:var(--t1)}

.tl{position:relative;padding-left:24px;margin:16px 0}
.tl::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--bd)}
.tli{position:relative;padding:0 0 20px 18px}
.tli::before{content:'';position:absolute;left:-22px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg)}
.tli .ty{font-family:var(--mono);font-size:10px;color:var(--cyan);margin-bottom:3px}
.tli .tt{font-weight:500;color:var(--t1);font-size:14px;margin-bottom:3px}
.tli .td{font-size:12.5px;color:var(--t2);line-height:1.6}

.co{border-radius:7px;padding:14px 16px;margin:14px 0;font-size:13px;line-height:1.7}
.co-i{background:var(--cyanA);border-left:3px solid var(--cyan);color:var(--t2)}
.co-w{background:var(--amberA);border-left:3px solid var(--amber);color:var(--t2)}
.co-k{background:var(--greenA);border-left:3px solid var(--green);color:var(--t2)}
.co .col{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;font-weight:600}
.co-i .col{color:var(--cyan)}.co-w .col{color:var(--amber)}.co-k .col{color:var(--green)}

.tabs{margin:16px 0}
.tabs-h{display:flex;gap:0;border-bottom:1px solid var(--bd);overflow-x:auto}
.tbtn{padding:8px 16px;font-family:var(--mono);font-size:10.5px;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap}
.tbtn:hover{color:var(--t2)}
.tbtn.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.tpnl{display:none;padding:16px 0}
.tpnl.on{display:block}

.acc{margin:14px 0}
.aci{border:1px solid var(--bd);border-radius:7px;margin-bottom:6px;overflow:hidden}
.atr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg3);border:none;color:var(--t1);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;text-align:left}
.atr:hover{background:var(--bg4)}
.atr .aw{transition:transform .2s;color:var(--t3)}
.aci.open .atr .aw{transform:rotate(90deg)}
.abd{display:none;padding:14px 16px;font-size:12.5px;color:var(--t2);line-height:1.7;background:var(--bg2)}
.aci.open .abd{display:block}

.quiz{background:var(--bg3);border:1px solid var(--bd);border-radius:9px;padding:20px;margin:18px 0}
.quiz .qq{font-weight:500;margin-bottom:14px;color:var(--t1);font-size:14px}
.qopt{display:block;width:100%;text-align:left;padding:9px 14px;margin-bottom:5px;background:var(--bg4);border:1px solid var(--bd);border-radius:6px;color:var(--t2);cursor:pointer;font-size:12.5px;font-family:var(--sans);transition:all .12s}
.qopt:hover{border-color:var(--bd2);background:var(--bg5)}
.qopt.ok{border-color:var(--green);background:var(--greenA);color:var(--green)}
.qopt.no{border-color:var(--red);background:var(--redA);color:var(--red)}
.qexp{display:none;margin-top:10px;padding:10px 14px;background:var(--greenA);border-radius:6px;font-size:12.5px;color:var(--t2);line-height:1.6}

.mstrip{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
.mitem{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:12px 16px;flex:1;min-width:120px}
.mitem .mv{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--cyan)}
.mitem .ml{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--mono)}

.slist{list-style:none;margin:10px 0}
.slist li{padding:5px 0 5px 18px;position:relative;color:var(--t2);font-size:13px}
.slist li::before{content:'▸';position:absolute;left:0;color:var(--cyan)}
.slist li strong{color:var(--t1);font-weight:500}

.tag{display:inline-block;font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:3px;margin:1px}
.tag-c{background:var(--cyanA);color:var(--cyan)}
.tag-g{background:var(--greenA);color:var(--green)}
.tag-a{background:var(--amberA);color:var(--amber)}
.tag-p{background:var(--purpleA);color:var(--purple)}
.tag-b{background:var(--blueA);color:var(--blue)}

.chnav{display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--bd)}
.cnbtn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;color:var(--t2);cursor:pointer;font-family:var(--sans);font-size:12.5px;transition:all .12s}
.cnbtn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyanA)}

.g25{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}
.g25-i{border-radius:7px;padding:16px;text-align:center}
.g25-i .gv{font-size:24px;font-weight:700;font-family:var(--mono)}
.g25-i .gl{font-weight:500;margin-top:3px;font-size:13px;color:var(--t1)}
.g25-i .gs{font-size:10px;color:var(--t3);margin-top:3px}
</style>
</head>
<body>

<div id="overlay" onclick="toggleSB()"></div>
<div id="app">
<aside id="sidebar">
  <div class="s-head">
    <div class="s-logo">&#9670; Mission Control</div>
    <div class="s-title">Practical MLOps</div>
    <div class="s-sub">Gift &amp; Deza &middot; O'Reilly 2021</div>
  </div>
  <div class="s-search"><input type="text" placeholder="Search..." oninput="filterN(this.value)"></div>
  <div class="s-nav" id="snav"></div>
  <div class="s-foot">
    <div class="lbl"><span>PROGRESS</span><span id="ppct">0%</span></div>
    <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
  </div>
</aside>
<div id="main">
  <div id="mobileBar">
    <button onclick="toggleSB()">&#9776;</button>
    <span>MLOPS MISSION CONTROL</span>
  </div>
  <div class="vp" id="vp"></div>
</div>
</div>

<script>
var NAV=[
  {s:"Foundations"},{id:0,t:"Prologue: Why MLOps?"},{id:1,t:"Introduction to MLOps"},{id:2,t:"MLOps Foundations"},
  {s:"Core Practices"},{id:3,t:"Containers & Edge"},{id:4,t:"Continuous Delivery for ML"},{id:5,t:"AutoML & KaizenML"},{id:6,t:"Monitoring & Logging"},
  {s:"Cloud Platforms"},{id:7,t:"MLOps for AWS"},{id:8,t:"MLOps for Azure"},{id:9,t:"MLOps for GCP"},
  {s:"Advanced Topics"},{id:10,t:"ML Interoperability"},{id:11,t:"CLI Tools & Microservices"},{id:12,t:"Case Studies & Patterns"}
];

function buildNav(){var el=document.getElementById("snav"),h="";NAV.forEach(function(n){if(n.s)h+='<div class="s-lbl">'+n.s+"</div>";else h+='<div class="s-item" data-ch="'+n.id+'" onclick="go('+n.id+')"><span class="s-num">'+String(n.id).padStart(2,"0")+"</span>"+n.t+"</div>"});el.innerHTML=h}

function E(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function H(){return Array.prototype.join.call(arguments,"")}

// Helpers
function hd(badge,title,sub){return '<div class="ch-head"><div class="ch-badge">'+badge+'</div><h1 class="ch-title">'+title+'</h1><p class="ch-sub">'+sub+'</p></div>'}
function sec(ico,t){return '<div class="sh"><span class="ico">'+ico+'</span>'+t+'</div>'}
function p(t){return '<div class="st">'+t+'</div>'}
function ctx(lbl,q,a){return '<div class="ctx" onclick="this.classList.toggle(\'exp\')"><div class="ql">'+lbl+'</div><div class="qt">'+q+'</div><div class="qa">'+a+'</div></div>'}
function tli(y,t,d){return '<div class="tli"><div class="ty">'+y+'</div><div class="tt">'+t+'</div><div class="td">'+d+'</div></div>'}
function acc(t,b){return '<div class="aci"><button class="atr" onclick="this.parentElement.classList.toggle(\'open\')"><span>'+t+'</span><span class="aw">&#9656;</span></button><div class="abd">'+b+'</div></div>'}
function fn(l,d,bc){return '<div class="fnode"'+(bc?' style="border-color:'+bc+'"':'')+'><div class="nl">'+l+'</div><div class="nd">'+d+'</div></div>'}
function fa(){return '<div class="farr">&rarr;</div>'}
function cb(lang,code){return '<div class="cblk"><div class="cblk-h"><span class="cblk-l">'+lang+'</span><button class="cblk-c" onclick="var t=this.parentElement.nextElementSibling.textContent;navigator.clipboard.writeText(t);this.textContent=\'Done!\';setTimeout(function(){this.textContent=\'Copy\'}.bind(this),1500)">Copy</button></div><div class="cblk-b">'+E(code)+'</div></div>'}
function co(type,label,body){return '<div class="co co-'+type+'"><div class="col">'+label+'</div>'+body+'</div>'}
function cc(icon,bgc,clr,title,desc,deep){return '<div class="ccard"'+(deep?' onclick="this.classList.toggle(\'exp\')"':'')+'><div class="ci" style="background:var(--'+bgc+');color:var(--'+clr+')">'+icon+'</div><div class="ct">'+title+'</div><div class="cd">'+desc+'</div>'+(deep?'<div class="cx">'+deep+'</div>':'')+'</div>'}
function mi(v,l){return '<div class="mitem"><div class="mv">'+v+'</div><div class="ml">'+l+'</div></div>'}
function pl(idx,t,w,bg,c){return '<div class="plvl" style="width:'+w+';background:'+bg+';color:'+c+'" onclick="showPyr('+idx+')">'+t+'</div>'}
function g25(v,l,s,bg,c){return '<div class="g25-i" style="background:var(--'+bg+')"><div class="gv" style="color:var(--'+c+')">'+v+'</div><div class="gl">'+l+'</div><div class="gs">'+s+'</div></div>'}
function quiz(q,opts,ci,expl){var h='<div class="quiz"><div class="qq">'+q+'</div>';for(var i=0;i<opts.length;i++)h+='<button class="qopt" onclick="checkQ(this,'+i+','+ci+')">'+opts[i]+'</button>';return h+'<div class="qexp">'+expl+'</div></div>'}
function tabs(pre,labels,contents){var h='<div class="tabs"><div class="tabs-h">';for(var i=0;i<labels.length;i++)h+='<button class="tbtn'+(i===0?' on':'')+'" onclick="swTab(this,\''+pre+i+'\')">'+labels[i]+'</button>';h+='</div>';for(var i=0;i<contents.length;i++)h+='<div class="tpnl'+(i===0?' on':'')+'" id="'+pre+i+'"><div class="st">'+contents[i]+'</div></div>';return h+'</div>'}

// ─── CHAPTERS ───
function CH(id){
var R="";
switch(id){

// ═══ CH0: PROLOGUE ═══
case 0:
R+=hd("Prologue","Why Does MLOps Even Exist?","Before tools or techniques &mdash; why was MLOps invented? What was broken? Why should you care?");
R+='<div class="sec">'+sec("&#128269;","The Foundational Questions")+'<div class="ctx-grid">';
R+=ctx("Origin","Why does MLOps exist?","MLOps exists because <strong>organizations invested millions in data science but saw almost zero return</strong>. Up to 87% of ML models never reached production. Data scientists built models in notebooks, but those models rarely shipped. MLOps bridges this &ldquo;last mile&rdquo; gap &mdash; applying proven DevOps automation to deploying, monitoring, and maintaining ML systems.");

var curCh=0,visited={0:1},totalCh=13;

function render(id){
  curCh=id;visited[id]=1;
  var vp=document.getElementById("vp");
  var content=CH(id);
  var prev=id>0?'<button class="cnbtn" onclick="go('+(id-1)+')">&larr; Ch '+String(id-1).padStart(2,"0")+'</button>':"<div></div>";
  var next=id<totalCh-1?'<button class="cnbtn" onclick="go('+(id+1)+')">Ch '+String(id+1).padStart(2,"0")+' &rarr;</button>':"<div></div>";
  vp.innerHTML=content+'<div class="chnav">'+prev+next+'</div>';
  document.querySelectorAll(".s-item").forEach(function(el){el.classList.toggle("on",parseInt(el.dataset.ch)===id)});
  var pct=Math.round(Object.keys(visited).length/totalCh*100);
  document.getElementById("ppct").textContent=pct+"%";
  document.getElementById("pfill").style.width=pct+"%";
  window.scrollTo(0,0);
}

function go(id){render(id);closeSB()}
function toggleSB(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("overlay").classList.toggle("open")}
function closeSB(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open")}
